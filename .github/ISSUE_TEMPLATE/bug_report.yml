name: "🐛 Bug Report"
description: Report something that isn't working correctly.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        A clear description of what the problem is.

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      placeholder: "What should happen instead"

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      placeholder: "What actually happens"

  - type: textarea
    id: context
    attributes:
      label: "Context / Screenshots"
      placeholder: |
        Browser/OS: ...
        Screenshots, logs, or relevant details

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      placeholder: |
        - OS: ...
        - App Version: ...
        - Browser: ...
        - Backend: local / homelab

  - type: checkboxes
    id: checklists
    attributes:
      label: "Checklist"
      options:
        - label: "I have searched for similar issues"
          required: true
        - label: "I can reproduce the bug with a fresh install"
          required: false

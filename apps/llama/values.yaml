app-template:
  controllers:
    main:
      replicas: 1
      pod:
        runtimeClassName: nvidia
        securityContext:
          fsGroup: 1000
        tolerations:
          - key: dedicated
            operator: Equal
            value: arcanine
            effect: NoSchedule
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values:
                        - "arcanine"
      initContainers:
        check-model-ready:
          image:
            repository: alpine
            tag: latest
          env:
            LLAMA_ARG_MODEL:
              value: /models/Qwen3.5-27B-UD-Q3_K_XL.gguf
          command:
            - /bin/sh
            - -c
          args:
            - |
              # If model exists and is non-empty, exit immediately
              if [ -s "$LLAMA_ARG_MODEL" ]; then
                echo "Model present: $LLAMA_ARG_MODEL"
                ls -lh "$LLAMA_ARG_MODEL"
                exit 0
              fi
              
              # Wait for the model to be downloaded
              echo "Waiting for model to be downloaded..."
              until [ -s "$LLAMA_ARG_MODEL" ]; do
                echo "  - $(stat -c%s "$LLAMA_ARG_MODEL" 2>/dev/null || echo 'missing')"
                sleep 10
              done
              echo "Model ready"
      containers:
        main:
          image:
            repository: ghcr.io/ggml-org/llama.cpp
            tag: server
          env:
            TZ: America/Chicago
            PUID: "1000"
            PGID: "1000"
            LLAMA_ARG_HOST: 0.0.0.0
            LLAMA_ARG_PORT: "8080"
            LLAMA_ARG_MODEL: /models/Qwen3.5-27B-UD-Q3_K_XL.gguf
            LLAMA_ARG_CTX_SIZE: "128000"
            LLAMA_ARG_N_PARALLEL: "2"
            LLAMA_ARG_N_GPU_LAYERS: "99"
            LLAMA_ARG_WEBUI: "true"
            NVIDIA_VISIBLE_DEVICES: "all"
            NVIDIA_DRIVER_CAPABILITIES: "all"
            FFMPEG_HWACCEL: "cuda"

    downloader:
      replicas: 1
      pod:
        securityContext:
          fsGroup: 1000
        tolerations:
          - key: dedicated
            operator: Equal
            value: arcanine
            effect: NoSchedule
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values:
                        - "arcanine"
      containers:
        downloader:
          image:
            repository: curlimages/curl
            tag: 8.12.1
          env:
            HF_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: hf-token
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              mkdir -p /models

              download_model() {
                url="$1"
                dest="$2"
                if [ -s "$dest" ]; then
                  echo "Model already present: $dest"
                  return 0
                fi

                echo "Downloading $dest"
                curl -L --fail --retry 5 --retry-delay 5 -C - \
                  -H "Authorization: Bearer ${HF_TOKEN}" \
                  -o "${dest}.part" \
                  "$url"
                mv "${dest}.part" "$dest"
              }

              download_model "https://huggingface.co/unsloth/Qwen3.5-27B-GGUF/resolve/main/Qwen3.5-27B-UD-Q3_K_XL.gguf" "/models/Qwen3.5-27B-UD-Q3_K_XL.gguf"
              download_model "https://huggingface.co/unsloth/Qwen3.5-9B-GGUF/resolve/main/Qwen3.5-9B-UD-Q8_K_XL.gguf" "/models/Qwen3.5-9B-UD-Q8_K_XL.gguf"

              echo "All requested models are present; keeping downloader pod alive"
              exec tail -f /dev/null

  defaultPodOptions:
    annotations:
      operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/vogirq5dgfcbbp4trs66xtrshu"
      operator.1password.io/item-name: "secrets"

  service:
    main:
      controller: main
      primary: true
      ports:
        http:
          port: 8080
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: homelab-tunnel.eaglepass.io
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host llama.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - *host
          secretName: llama-tls

  persistence:
    data:
      accessMode: ReadWriteOnce
      size: 50Gi
      advancedMounts:
        main:
          check-model-ready:
            - path: /models
          main:
            - path: /models
        downloader:
          downloader:
            - path: /models

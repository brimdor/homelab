app-template:
  controllers:
    main:
      strategy: RollingUpdate
      replicas: 1
      containers:
        main:
          nameOverride: echo-dashboard
          image:
            repository: 10.0.20.11:32309/echo-dashboard
            tag: latest
            pullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            TZ: America/Chicago
          envFrom:
            - secretRef:
                name: echo-secrets
          probes:
            liveness:
              enabled: true
              spec:
                httpGet:
                  path: /health
                  port: 8000
                initialDelaySeconds: 10
                periodSeconds: 30
            readiness:
              enabled: true
              spec:
                httpGet:
                  path: /health
                  port: 8000
                initialDelaySeconds: 5
                periodSeconds: 10
          resources:
            limits:
              cpu: 1
              memory: 512Mi
            requests:
              cpu: 0.1
              memory: 128Mi
  service:
    main:
      primary: true
      ports:
        http:
          port: 8000
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: echo.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - echo.eaglepass.io
          secretName: echo-dashboard-tls
  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      storageClass: standard-rwo
      globalMounts:
        - path: /app/data
  defaultPodOptions:
    securityContext:
      fsGroup: 1000
    annotations:
      operator.1password.io/item-path: vaults/4uaua4a45yuhnwhehp5bwylmti/items/echo-secrets
      operator.1password.io/item-name: secrets

app-template:
  controllers:
    main:
      replicas: 1
      containers:
        main:
          image:
            repository: 10.0.20.11:32309/podwave
            tag: latest
            pullPolicy: Always
          env:
            TZ: America/Chicago
            NODE_ENV: production
            PORT: "3000"
            PODWAVE_CORS_ORIGIN: "https://podwave.eaglepass.io"
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: http
                initialDelaySeconds: 10
                periodSeconds: 15
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: http
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: http
                failureThreshold: 30
                periodSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
  service:
    main:
      controller: main
      primary: true
      type: ClusterIP
      ports:
        http:
          port: 3000
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: homelab-tunnel.eaglepass.io
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: podwave.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - podwave.eaglepass.io
          secretName: podwave-tls
  persistence:
    data:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/podwave
    downloads:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/podwave-downloads

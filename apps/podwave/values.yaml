app-template:
  controllers:
    main:
      replicas: 1
      containers:
        main:
          image:
            repository: 10.0.20.11:32309/podwave
            tag: "2026-04-02-v47"
            pullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            TZ: America/Chicago
            NODE_ENV: production
            PORT: "3000"
            PODWAVE_CORS_ORIGIN: "https://podwave.eaglepass.io"
            PODWAVE_ADMIN_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: PODWAVE_ADMIN_USERNAME
            PODWAVE_ADMIN_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: PODWAVE_ADMIN_PASSWORD
            PODWAVE_ADMIN_NAME:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: PODWAVE_ADMIN_NAME
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: 3000
                initialDelaySeconds: 10
                periodSeconds: 15
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: 3000
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: 3000
                failureThreshold: 30
                periodSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
  service:
    main:
      controller: main
      primary: true
      type: ClusterIP
      ports:
        http:
          port: 3000
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: homelab-tunnel.eaglepass.io
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: podwave.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - podwave.eaglepass.io
          secretName: podwave-tls
  defaultPodOptions:
    annotations:
      operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/thgauj67wkda7qutwsnezqbjra"
      operator.1password.io/item-name: "secrets"
  persistence:
    data:
      type: persistentVolumeClaim
      size: 5Gi
      accessMode: ReadWriteOnce
    downloads:
      type: persistentVolumeClaim
      size: 10Gi
      accessMode: ReadWriteOnce

app-template:
  controllers:
    main:
      strategy: RollingUpdate
      replicas: 1
      containers:
        main:
          nameOverride: podwave
          image:
            repository: 10.0.20.11:32309/podwave
            tag: latest
            pullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            NODE_ENV: production
            TZ: America/Chicago
          probes:
            liveness:
              enabled: true
              spec:
                httpGet:
                  path: /
                  port: 3000
                initialDelaySeconds: 15
                periodSeconds: 20
            readiness:
              enabled: true
              spec:
                httpGet:
                  path: /
                  port: 3000
                initialDelaySeconds: 5
                periodSeconds: 10
          resources:
            limits:
              cpu: 1000m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
  service:
    main:
      primary: true
      ports:
        http:
          port: 3000
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - host: podwave.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: 3000
      tls:
        - hosts:
            - podwave.eaglepass.io
          secretName: podwave-tls
  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      storageClass: standard-rwo
      globalMounts:
        - path: /app/data
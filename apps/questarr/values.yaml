# Questarr production Helm chart.
#
# Questarr is a single-container Node.js + SQLite application. The container
# exposes port 5000 and serves the React SPA on "/" plus the Express API under
# "/api/*". SQLite is file-locked, so the Deployment uses strategy: Recreate
# and a single replica to prevent concurrent writers from corrupting the DB.
#
# Secrets are materialized by the 1Password Connect operator via the
# defaultPodOptions annotations below. The expected keys are:
#   - jwt-secret
#   - credentials-encryption-key (64-character hex)
#   - igdb-client-id
#   - igdb-client-secret
#   - nexusmods-api-key

app-template:
  controllers:
    main:
      strategy: Recreate
      replicas: 1
      containers:
        main:
          nameOverride: questarr
          image:
            repository: registry.eaglepass.io/questarr
            tag: 1.3.1
            pullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            TZ: America/Chicago
            PORT: "5000"
            HOST: "0.0.0.0"
            NODE_ENV: production
            SQLITE_DB_PATH: /app/data/sqlite.db
            JWT_SECRET:
              valueFrom:
                secretKeyRef:
                  name: questarr-secrets
                  key: jwt-secret
            CREDENTIALS_ENCRYPTION_KEY:
              valueFrom:
                secretKeyRef:
                  name: questarr-secrets
                  key: credentials-encryption-key
            IGDB_CLIENT_ID:
              valueFrom:
                secretKeyRef:
                  name: questarr-secrets
                  key: igdb-client-id
            IGDB_CLIENT_SECRET:
              valueFrom:
                secretKeyRef:
                  name: questarr-secrets
                  key: igdb-client-secret
            NEXUSMODS_API_KEY:
              valueFrom:
                secretKeyRef:
                  name: questarr-secrets
                  key: nexusmods-api-key
            ALLOWED_ORIGINS: https://questarr.eaglepass.io
            APP_URL: https://questarr.eaglepass.io
          probes:
            liveness:
              enabled: true
              type: HTTP
              path: /api/health
              spec:
                initialDelaySeconds: 30
                periodSeconds: 30
                timeoutSeconds: 10
                failureThreshold: 3
            readiness:
              enabled: true
              type: HTTP
              path: /api/ready
              spec:
                initialDelaySeconds: 5
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
            startup:
              enabled: true
              type: HTTP
              path: /api/health
              spec:
                initialDelaySeconds: 20
                periodSeconds: 10
                failureThreshold: 30
          resources:
            limits:
              cpu: 1000m
              memory: 1024Mi
            requests:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

  service:
    main:
      primary: true
      controller: main
      ports:
        http:
          port: 5000
          protocol: HTTP
          targetPort: http

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: homelab-tunnel.eaglepass.io
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - host: questarr.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - questarr.eaglepass.io
          secretName: questarr-tls

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 5Gi
      storageClass: standard-rwo
      globalMounts:
        - path: /app/data
          readOnly: false

  defaultPodOptions:
    securityContext:
      fsGroup: 1000
    annotations:
      operator.1password.io/item-name: "questarr-secrets"
      operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/6zdhwfahkjhkacbc2l5222uvhq"

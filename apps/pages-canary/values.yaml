app-template:
  controllers:
    main:
      strategy: RollingUpdate
      replicas: 1
      containers:
        main:
          nameOverride: pages-canary
          image:
            repository: 10.0.20.11:32309/pages
            tag: "latest-canary"
            pullPolicy: Always
          ports:
            - containerPort: 80
              name: http
            - containerPort: 5000
              name: api
          env:
            TZ: America/Chicago
            PAGES_API_ENABLED:
              value: "true"
            PAGES_API_KEY:
              valueFrom:
                secretKeyRef:
                  name: pages-api-key
                  key: api-key
            PAGES_CF_ACCESS:
              value: "false"
          probes:
            liveness:
              enabled: true
              type: Exec
              spec:
                exec:
                  command:
                    - /usr/local/bin/healthcheck.sh
                initialDelaySeconds: 30
                periodSeconds: 60
                failureThreshold: 2
            readiness:
              enabled: true
              type: HTTP
              path: /
              spec:
                initialDelaySeconds: 3
                periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
  service:
    main:
      primary: true
      ports:
        http:
          port: 80
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - host: pages-canary.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - pages-canary.eaglepass.io
          secretName: pages-canary-tls
  persistence:
    data:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        main:
          main:
            - path: /usr/share/nginx/html
  defaultPodOptions:
    securityContext:
      fsGroup: 1000
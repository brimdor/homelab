app-template:
  controllers:
    main:
      replicas: 1
      initContainers:
        bootstrap-state:
          image:
            repository: docker.io/alpine
            tag: "3.21"
            pullPolicy: Always
          env:
            PAPERCLIP_PUBLIC_URL: https://paperclip.eaglepass.io
            DATABASE_URL:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: database-url
            MARIADB_HOST: 127.0.0.1
            MARIADB_PORT: "3306"
            MARIADB_DATABASE: paperclip
            MARIADB_USER: paperclip
            MARIADB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: mariadb-password
            PAPERCLIP_AGENT_JWT_SECRET:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: agent-jwt-secret
            PAPERCLIP_SECRETS_MASTER_KEY:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: secrets-master-key
            GH_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: gh-token
            GITHUB_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: gh-token
          command:
            - /bin/sh
            - -ec
            - |
              instance_dir="/paperclip/instances/paperclip"
              mkdir -p \
                "$instance_dir/data/storage" \
                "$instance_dir/data/backups" \
                "$instance_dir/logs" \
                "$instance_dir/secrets"

              cat > "$instance_dir/config.json" <<EOF
              {
                "\$meta": {
                  "version": 1,
                  "updatedAt": "1970-01-01T00:00:00.000Z",
                  "source": "configure"
                },
                "database": {
                  "mode": "postgres",
                  "connectionString": "$DATABASE_URL",
                  "backup": {
                    "enabled": true,
                    "intervalMinutes": 60,
                    "retentionDays": 30,
                    "dir": "$instance_dir/data/backups"
                  }
                },
                "logging": {
                  "mode": "file",
                  "logDir": "$instance_dir/logs"
                },
                "server": {
                  "deploymentMode": "authenticated",
                  "exposure": "public",
                  "host": "0.0.0.0",
                  "port": 3100,
                  "allowedHostnames": ["paperclip.eaglepass.io"],
                  "serveUi": true
                },
                "auth": {
                  "baseUrlMode": "explicit",
                  "publicBaseUrl": "$PAPERCLIP_PUBLIC_URL",
                  "disableSignUp": false
                },
                "storage": {
                  "provider": "local_disk",
                  "localDisk": {
                    "baseDir": "$instance_dir/data/storage"
                  },
                  "s3": {
                    "bucket": "paperclip",
                    "region": "us-east-1",
                    "prefix": "",
                    "forcePathStyle": false
                  }
                },
                "secrets": {
                  "provider": "local_encrypted",
                  "strictMode": false,
                  "localEncrypted": {
                    "keyFilePath": "$instance_dir/secrets/master.key"
                  }
                }
              }
              EOF

              {
                printf 'PAPERCLIP_AGENT_JWT_SECRET=%s\n' "$PAPERCLIP_AGENT_JWT_SECRET"
                printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
                printf 'MARIADB_HOST=%s\n' "$MARIADB_HOST"
                printf 'MARIADB_PORT=%s\n' "$MARIADB_PORT"
                printf 'MARIADB_DATABASE=%s\n' "$MARIADB_DATABASE"
                printf 'MARIADB_USER=%s\n' "$MARIADB_USER"
                printf 'MARIADB_PASSWORD=%s\n' "$MARIADB_PASSWORD"
                printf 'GH_TOKEN=%s\n' "$GH_TOKEN"
                printf 'GITHUB_TOKEN=%s\n' "$GITHUB_TOKEN"
              } > "$instance_dir/.env"
              printf '%s' "$PAPERCLIP_SECRETS_MASTER_KEY" > "$instance_dir/secrets/master.key"
              chmod 600 "$instance_dir/.env" "$instance_dir/secrets/master.key"
        opencode-install:
          image:
            repository: docker.io/alpine
            tag: "3.21"
            pullPolicy: Always
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
          env:
            HOME: /home/node
            PATH: /home/node/.opencode/bin:/home/node/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          command:
            - /bin/sh
            - -ec
            - |
              helper_include="$HOME/.config/git/gh-credential-helper.inc"
              gitconfig="$HOME/.gitconfig"

              mkdir -p \
                "$HOME/.config/git" \
                "$HOME/.local/share/opencode" \
                "$HOME/.opencode/bin"

              cat > "$helper_include" <<'EOF'
              [credential "https://github.com"]
                helper =
                helper = !/usr/bin/gh auth git-credential
              [credential "https://gist.github.com"]
                helper =
                helper = !/usr/bin/gh auth git-credential
              EOF

              if [ -f "$gitconfig" ]; then
                if ! grep -qF "path = $helper_include" "$gitconfig"; then
                  printf '\n[include]\n  path = %s\n' "$helper_include" >> "$gitconfig"
                fi
              else
                cat > "$gitconfig" <<EOF
              [include]
                path = $helper_include
              EOF
              fi

              chmod 600 "$helper_include" "$gitconfig"

              if [ -x "$HOME/.opencode/bin/opencode" ]; then
                chown -R 0:0 "$HOME/.config" "$HOME/.local" "$HOME/.opencode"
                chmod -R u+rwX "$HOME/.config" "$HOME/.local" "$HOME/.opencode"
                echo "opencode already installed"
                exit 0
              fi
              apk add --no-cache curl tar
              arch="$(uname -m)"
              case "$arch" in
                x86_64) target="linux-x64" ;;
                aarch64) target="linux-arm64" ;;
                *) echo "unsupported arch: $arch" >&2; exit 1 ;;
              esac
              tmpdir="$(mktemp -d)"
              trap 'rm -rf "$tmpdir"' EXIT
              curl -fsSL -o "$tmpdir/opencode.tar.gz" "https://github.com/anomalyco/opencode/releases/latest/download/opencode-${target}.tar.gz"
              tar -xzf "$tmpdir/opencode.tar.gz" -C "$tmpdir"
              install -m 0755 "$tmpdir/opencode" "$HOME/.opencode/bin/opencode"
              chown -R 0:0 "$HOME/.config" "$HOME/.local" "$HOME/.opencode"
              chmod -R u+rwX "$HOME/.config" "$HOME/.local" "$HOME/.opencode"
      containers:
        mariadb:
          image:
            repository: docker.io/mariadb
            tag: "12.2"
            pullPolicy: IfNotPresent
          env:
            TZ: America/Chicago
            MARIADB_DATABASE: paperclip
            MARIADB_USER: paperclip
            MARIADB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: mariadb-password
            MARIADB_ROOT_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: mariadb-root-password
          probes:
            startup:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - sh
                    - -c
                    - 'mariadb-admin ping -h 127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD"'
                periodSeconds: 10
                failureThreshold: 60
            readiness:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - sh
                    - -c
                    - 'mariadb-admin ping -h 127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD"'
                periodSeconds: 10
                failureThreshold: 6
            liveness:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - sh
                    - -c
                    - 'mariadb-admin ping -h 127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD"'
                periodSeconds: 30
                failureThreshold: 6
        main:
          image:
            repository: 10.0.20.11:32309/paperclip
            tag: latest
            pullPolicy: Always
          env:
            TZ: America/Chicago
            HOME: /home/node
            PATH: /home/node/.opencode/bin:/home/node/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            HOST: 0.0.0.0
            PORT: "3100"
            NODE_ENV: production
            SERVE_UI: "true"
            PAPERCLIP_HOME: /paperclip
            PAPERCLIP_INSTANCE_ID: paperclip
            PAPERCLIP_CONFIG: /paperclip/instances/paperclip/config.json
            PAPERCLIP_DEPLOYMENT_MODE: authenticated
            PAPERCLIP_DEPLOYMENT_EXPOSURE: public
            PAPERCLIP_PUBLIC_URL: https://paperclip.eaglepass.io
            MARIADB_HOST: 127.0.0.1
            MARIADB_PORT: "3306"
            MARIADB_DATABASE: paperclip
            MARIADB_USER: paperclip
            MARIADB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: mariadb-password
            DATABASE_URL:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: database-url
            BETTER_AUTH_SECRET:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: better-auth-secret
            PAPERCLIP_AGENT_JWT_SECRET:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: agent-jwt-secret
            GH_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: gh-token
            GITHUB_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: gh-token
          probes:
            startup:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 3100
                periodSeconds: 10
                failureThreshold: 60
            readiness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 3100
                periodSeconds: 10
                failureThreshold: 6
            liveness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 3100
                periodSeconds: 30
                failureThreshold: 6
  service:
    main:
      controller: main
      primary: true
      ports:
        http:
          port: 3100
          protocol: HTTP
    mariadb:
      controller: main
      ports:
        mysql:
          port: 3306
          protocol: TCP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host paperclip.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - *host
          secretName: paperclip-tls-certificate
  persistence:
    data:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/paperclip
      advancedMounts:
        main:
          bootstrap-state:
            - path: /paperclip
          main:
            - path: /paperclip
    home:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 15Gi
      advancedMounts:
        main:
          opencode-install:
            - path: /home/node
          main:
            - path: /home/node
    mariadb-data:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        main:
          mariadb:
            - path: /var/lib/mysql
          main:
            - path: /srv/mariadb
  defaultPodOptions:
    shareProcessNamespace: true
    securityContext:
      runAsUser: 0
      runAsGroup: 0
    annotations:
      operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/oed3ydnybql5ajq3aspmbiogke"
      operator.1password.io/item-name: "secrets"

app-template:
  controllers:
    main:
      replicas: 1
      initContainers:
        opencode-install:
          image:
            repository: docker.io/alpine
            tag: "3.21"
            pullPolicy: Always
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
          env:
            HOME: /home/node
            PATH: /home/node/.opencode/bin:/home/node/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          command:
            - /bin/sh
            - -ec
            - |
              if [ -x "$HOME/.opencode/bin/opencode" ]; then
                echo "opencode already installed"
                exit 0
              fi
              apk add --no-cache curl tar
              arch="$(uname -m)"
              case "$arch" in
                x86_64) target="linux-x64" ;;
                aarch64) target="linux-arm64" ;;
                *) echo "unsupported arch: $arch" >&2; exit 1 ;;
              esac
              mkdir -p "$HOME/.config" "$HOME/.opencode/bin"
              tmpdir="$(mktemp -d)"
              trap 'rm -rf "$tmpdir"' EXIT
              curl -fsSL -o "$tmpdir/opencode.tar.gz" "https://github.com/anomalyco/opencode/releases/latest/download/opencode-${target}.tar.gz"
              tar -xzf "$tmpdir/opencode.tar.gz" -C "$tmpdir"
              install -m 0755 "$tmpdir/opencode" "$HOME/.opencode/bin/opencode"
              chown -R 1000:1000 "$HOME/.config" "$HOME/.opencode"
      containers:
        main:
          image:
            repository: 10.0.20.11:32309/paperclip
            tag: latest
            pullPolicy: Always
          env:
            TZ: America/Chicago
            HOME: /home/node
            PATH: /home/node/.opencode/bin:/home/node/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            HOST: 0.0.0.0
            PORT: "3100"
            NODE_ENV: production
            SERVE_UI: "true"
            PAPERCLIP_HOME: /paperclip
            PAPERCLIP_INSTANCE_ID: paperclip
            PAPERCLIP_CONFIG: /paperclip/instances/paperclip/config.json
            PAPERCLIP_DEPLOYMENT_MODE: authenticated
            PAPERCLIP_DEPLOYMENT_EXPOSURE: public
            PAPERCLIP_PUBLIC_URL: https://paperclip.eaglepass.io
            DATABASE_URL:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: database-url
            BETTER_AUTH_SECRET:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: better-auth-secret
          probes:
            startup:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 3100
                periodSeconds: 10
                failureThreshold: 60
            readiness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 3100
                periodSeconds: 10
                failureThreshold: 6
            liveness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 3100
                periodSeconds: 30
                failureThreshold: 6
  service:
    main:
      controller: main
      primary: true
      ports:
        http:
          port: 3100
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host paperclip.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - *host
          secretName: paperclip-tls-certificate
  persistence:
    data:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/paperclip
      advancedMounts:
        main:
          main:
            - path: /paperclip
    home:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 5Gi
      advancedMounts:
        main:
          opencode-install:
            - path: /home/node
          main:
            - path: /home/node
  defaultPodOptions:
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    annotations:
      operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/oed3ydnybql5ajq3aspmbiogke"
      operator.1password.io/item-name: "secrets"

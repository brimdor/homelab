# =============================================================================
# Citadel Demo App — Team Task Manager
# =============================================================================
# bjw-s/app-template library chart values
# https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml
# =============================================================================

app-template:
  controllers:
    main:
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 1
        surge: "0"
      replicas: 1
      containers:
        backend:
          image:
            repository: 10.43.42.8:5000/broville/citadel_backend
            tag: latest
            pullPolicy: Always
          env:
            TZ: America/Chicago
            NODE_ENV: production
            PORT: "3001"
            DB_HOST:
              valueFrom:
                secretKeyRef:
                  name: citadel-secrets
                  key: db-host
            DB_PORT:
              valueFrom:
                secretKeyRef:
                  name: citadel-secrets
                  key: db-port
            DB_NAME:
              valueFrom:
                secretKeyRef:
                  name: citadel-secrets
                  key: db-name
            DB_USER:
              valueFrom:
                secretKeyRef:
                  name: citadel-secrets
                  key: db-user
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: citadel-secrets
                  key: db-password
            JWT_SECRET:
              valueFrom:
                secretKeyRef:
                  name: citadel-secrets
                  key: jwt-secret
            CORS_ORIGINS: '["https://citadel.eaglepass.io"]'
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: 3001
                initialDelaySeconds: 15
                periodSeconds: 10
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: 3001
                initialDelaySeconds: 5
                periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        frontend:
          image:
            repository: 10.43.42.8:5000/broville/citadel_frontend
            tag: latest
            pullPolicy: Always
          env:
            TZ: America/Chicago
            VITE_API_URL: https://citadel.eaglepass.io/api
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 5173
                initialDelaySeconds: 10
                periodSeconds: 10
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 5173
                initialDelaySeconds: 5
                periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

  service:
    main:
      controller: main
      ports:
        http:
          port: 5173
          protocol: HTTP
    backend:
      controller: main
      ports:
        http:
          port: 3001
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: citadel.eaglepass.io
          paths:
            - path: /api
              pathType: Prefix
              service:
                identifier: backend
                port: http
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - citadel.eaglepass.io
          secretName: citadel-tls


  defaultPodOptions:
    securityContext:
      fsGroup: 1000

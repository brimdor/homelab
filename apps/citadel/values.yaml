# =============================================================================
# Citadel — Streamlit Command Dashboard
# Single-container replacement for the broken FastAPI+React stack.
# =============================================================================

app-template:
  controllers:
    main:
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 1
        surge: "0"
      replicas: 1
      containers:
        main:
          image:
            repository: 10.0.20.11:32309/citadel
            tag: streamlit-v2
            pullPolicy: Always
          env:
            TZ: America/Chicago
          ports:
            - containerPort: 8501
              name: http
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /_stcore/health
                  port: 8501
                initialDelaySeconds: 20
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /_stcore/health
                  port: 8501
                initialDelaySeconds: 10
                periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi

  service:
    main:
      controller: main
      ports:
        http:
          port: 8501
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: citadel.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - citadel.eaglepass.io
          secretName: citadel-tls

  defaultPodOptions:
    securityContext:
      fsGroup: 1000

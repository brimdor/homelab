app-template:
  controllers:
    main:
      replicas: 1
      containers:
        main:
          image:
            repository: 10.0.20.11:32309/podwave
            tag: latest
            pullPolicy: Always
          env:
            TZ: America/Chicago
            NODE_ENV: production
            PORT: "3000"
            PODWAVE_CORS_ORIGIN: "https://podwave-canary.eaglepass.io"
            PODWAVE_ADMIN_EMAIL: "admin@eaglepass.io"
            PODWAVE_ADMIN_PASSWORD: "PodWave2026!"
            PODWAVE_ADMIN_NAME: "Admin"
          ports:
            - name: http
              containerPort: 3000
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: http
                initialDelaySeconds: 10
                periodSeconds: 15
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: http
                initialDelaySeconds: 5
                periodSeconds: 10
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: http
                failureThreshold: 30
                periodSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
  service:
    main:
      controller: main
      primary: true
      type: ClusterIP
      ports:
        http:
          port: 3000
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: homelab-tunnel.eaglepass.io
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: podwave-canary.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - podwave-canary.eaglepass.io
          secretName: podwave-canary-tls
  persistence:
    data:
      type: persistentVolumeClaim
      size: 5Gi
      accessMode: ReadWriteOnce
      storageClass: standard-rwo
      advancedMounts:
        main:
          main:
            - path: /app/data
            - path: /app/downloads

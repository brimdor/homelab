app-template:
  controllers:
    main:
      strategy: RollingUpdate
      replicas: 1
      containers:
        main:
          image:
            repository: 10.0.20.11:32309/nibble
            tag: "2026-04-22-v2"
            pullPolicy: Always
          env:
            TZ: America/Chicago
          probes:
            liveness:
              enabled: true
              type: HTTP
              path: /
              spec:
                initialDelaySeconds: 15
                periodSeconds: 10
            readiness:
              enabled: true
              type: HTTP
              path: /
              spec:
                initialDelaySeconds: 5
                periodSeconds: 10

  service:
    main:
      primary: true
      ports:
        http:
          port: 3000
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: nibble.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - nibble.eaglepass.io
          secretName: nibble-tls
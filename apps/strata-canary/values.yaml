app-template:
  controllers:
    main:
      replicas: 1
      containers:
        main:
          image:
            repository: 10.0.20.11:32309/strata
            tag: canary-20260527
            pullPolicy: Always
          env:
            TZ: America/Chicago
            NODE_ENV: canary
            PORT: "8787"
            STRATA_PORT: "8787"
            STRATA_DB_FILE: /app/data/strata.sqlite
            STRATA_SESSION_COOKIE: strata_canary_session
            SEED_DATA: "true"
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: http
                initialDelaySeconds: 30
                periodSeconds: 15
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: http
                initialDelaySeconds: 10
                periodSeconds: 10
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: http
                failureThreshold: 30
                periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  service:
    main:
      controller: main
      primary: true
      type: ClusterIP
      ports:
        http:
          port: 8787
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: homelab-tunnel.eaglepass.io
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: strata-canary.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - strata-canary.eaglepass.io
          secretName: strata-canary-tls
  persistence:
    data:
      type: emptyDir
      advancedMounts:
        main:
          main:
            - path: /app/data
  networkpolicies:
    main:
      enabled: true
      controller: main
      policyTypes:
        - Ingress
        - Egress
      rules:
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    name: ingress-nginx
            ports:
              - protocol: TCP
                port: 8787
        egress:
          - to:
              - namespaceSelector: {}
            ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
          - to:
              - ipBlock:
                  cidr: 10.0.40.3/32
            ports:
              - protocol: TCP
                port: 2049
  defaultPodOptions:
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
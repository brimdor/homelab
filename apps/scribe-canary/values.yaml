app-template:
  controllers:
    main:
      strategy: RollingUpdate
      replicas: 1
      containers:
        main:
          nameOverride: scribe-canary
          image:
            repository: 10.0.20.11:32309/scribe
            tag: "2026-04-060820-v1-canary"
            pullPolicy: Always
          ports:
            - containerPort: 8787
              name: http
          workingDir: /app
          env:
            NODE_ENV: production
            PORT: "8787"
            SCRIBE_DB_PATH: /app/server/data/scribe-canary.db
            SCRIBE_SESSION_TTL_HOURS: "24"
            SCRIBE_REPO_SYNC_ROOT: /app/server/repos
            OLLAMA_BASE_URL: "http://localhost:11434"
            TZ: America/Chicago
          envFrom:
            - secretRef:
                name: scribe-canary-secrets
          resources:
            limits:
              cpu: 2
              memory: 4096Mi
            requests:
              cpu: 0.5
              memory: 1024Mi
        ollama:
          nameOverride: ollama
          image:
            repository: ollama/ollama
            tag: "latest"
            pullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - ollama serve
          ports:
            - containerPort: 11434
              name: ollama
          resources:
            limits:
              cpu: 4
              memory: 16Gi
            requests:
              cpu: 1
              memory: 8Gi
  service:
    main:
      primary: true
      ports:
        http:
          port: 8787
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - host: scribe-canary.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - scribe-canary.eaglepass.io
          secretName: scribe-canary-tls
  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 5Gi
      storageClass: standard-rwo
      globalMounts:
        - path: /app/server/data
    repos:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 10Gi
      storageClass: standard-rwo
      globalMounts:
        - path: /app/server/repos
    ollama-models:
      type: emptyDir
      advancedMounts:
        main:
          scribe-canary:
            - path: /root/.ollama
          ollama:
            - path: /root/.ollama
  defaultPodOptions:
    securityContext:
      fsGroup: 1000
    hostNetwork: true
    nodeSelector:
      kubernetes.io/hostname: charmander
    annotations:
      operator.1password.io/item-path: vaults/4uaua4a45yuhnwhehp5bwylmti/items/scribe-canary-secrets
      operator.1password.io/item-name: secrets

app-template:
  controllers:
    main:
      strategy: RollingUpdate
      replicas: 1
      containers:
        backend:
          image:
            repository: 10.0.20.11:32309/broville/citadel_backend
            tag: issue-1-canary
            pullPolicy: Always
          env:
            TZ: America/Chicago
            CITADEL_BIND_HOST: "0.0.0.0"
            CITADEL_PORT: "3001"
            CITADEL_DATA_DIR: /home/citadel/.citadel
            CITADEL_DB_URL: "sqlite:////home/citadel/.citadel/citadel.db"
            CITADEL_LIVE_TRANSPORT: sse
            HERMES_DASHBOARD_URL: "http://127.0.0.1:9119"
            HERMES_API_SERVER_URL: "http://127.0.0.1:8642"
            HERMES_HOME: /home/citadel/.hermes
            HERMES_KANBAN_BOARD: default
            GITHUB_ORG: Broville
            GITHUB_PROJECT_NUMBER: "0"
            METRICS_REFRESH_SECONDS: "2"
            METRICS_GPU_ENABLED: "true"
            METRICS_TEMPS_ENABLED: "true"
            CORS_ORIGINS: '["https://citadel-canary.eaglepass.io"]'
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: 3001
                initialDelaySeconds: 15
                periodSeconds: 10
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: 3001
                initialDelaySeconds: 5
                periodSeconds: 10

        frontend:
          image:
            repository: 10.0.20.11:32309/broville/citadel_frontend
            tag: issue-1-canary
            pullPolicy: Always
          env:
            TZ: America/Chicago
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 5173
                initialDelaySeconds: 10
                periodSeconds: 10
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 5173
                initialDelaySeconds: 5
                periodSeconds: 10

  service:
    main:
      controller: main
      ports:
        http:
          port: 5173
          protocol: HTTP
    backend:
      controller: main
      ports:
        http:
          port: 3001
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      hosts:
        - host: citadel-canary.eaglepass.io
          paths:
            - path: /api
              pathType: Prefix
              service:
                identifier: backend
                port: http
            - path: /ws
              pathType: Prefix
              service:
                identifier: backend
                port: http
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - citadel-canary.eaglepass.io
          secretName: citadel-canary-tls

  persistence:
    data:
      enabled: true
      accessMode: ReadWriteOnce
      size: 1Gi
      storageClass: standard-rwo
      advancedMounts:
        main:
          backend:
            - path: /home/citadel/.citadel

  defaultPodOptions:
    securityContext:
      fsGroup: 999
    annotations:
      roll: "issue-1-canary"

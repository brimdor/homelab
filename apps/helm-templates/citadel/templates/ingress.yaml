{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "citadel.fullname" . }}
  labels:
    {{- include "citadel.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.cloudflare }}
    external-dns.alpha.kubernetes.io/target: "{{ .Values.ingress.cloudflare.tunnelDomain }}"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "{{ .Values.ingress.cloudflare.proxied }}"
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          {{- range .Values.ingress.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "citadel.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" (include "citadel.fullname" .)) }}
  {{- end }}
{{- end }}

# =============================================================================
# Citadel Project — Reference Helm Chart Values
# =============================================================================
# Copy this file into your project's helm-chart/ directory and customize.
# All values are documented with sensible defaults.
# =============================================================================

# -- Number of replicas (ignored when autoscaling.enabled is true)
replicas: 1

# -- Deployment strategy (RollingUpdate, Recreate)
deploymentStrategy: RollingUpdate

# -- Overrides the chart name used in resource names
nameOverride: ""

# -- Fully overrides the full resource name
fullnameOverride: ""

# =============================================================================
# Image
# =============================================================================
image:
  # -- Container image repository
  repository: ghcr.io/your-org/your-app
  # -- Container image tag
  tag: "latest"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Pull secrets for private container registries
imagePullSecrets: []

# =============================================================================
# Service
# =============================================================================
service:
  # -- Kubernetes Service type (ClusterIP, NodePort, LoadBalancer)
  type: ClusterIP
  # -- Service port
  port: 80

# =============================================================================
# Ingress
# =============================================================================
ingress:
  # -- Enable Ingress resource
  enabled: true
  # -- Ingress class name
  className: nginx
  # -- Ingress hostname
  host: your-app.eaglepass.io
  # -- Ingress path rules
  paths:
    - path: /
      pathType: Prefix
  # -- Additional Ingress annotations (e.g. cert-manager)
  annotations: {}
  # -- Cloudflare tunnel configuration (homelab standard)
  cloudflare:
    # -- Enable Cloudflare tunnel annotations
    tunnelDomain: "homelab-tunnel.eaglepass.io"
    # -- Proxy through Cloudflare
    proxied: "true"
  # -- TLS configuration
  tls:
    # -- Enable TLS
    enabled: true
    # -- TLS secret name (defaults to <release-name>-tls)
    secretName: ""

# =============================================================================
# ConfigMap
# =============================================================================
# -- Non-sensitive configuration injected as environment variables via ConfigMap
# Example:
# configMap:
#   NODE_ENV: production
#   LOG_LEVEL: info
configMap: {}

# =============================================================================
# ExternalSecret (External-Secrets Operator)
# =============================================================================
externalSecret:
  # -- Enable ExternalSecret resource
  enabled: false
  # -- ExternalSecret name (defaults to <release-name>-secrets)
  name: ""
  # -- How often to refresh from the external secrets store
  refreshInterval: "1h"
  # -- Reference to the SecretStore (cluster-wide or namespaced)
  secretStoreRef:
    # -- SecretStore name
    name: vault-backend
    # -- SecretStore kind (SecretStore, ClusterSecretStore)
    kind: ClusterSecretStore
  target:
    # -- Creation policy (Owner, Merge, None)
    creationPolicy: Owner
  # -- Secret keys to sync from the external store
  # Example:
  # data:
  #   - secretKey: DB_PASSWORD
  #     remoteRef:
  #       key: /citadel/my-app/prod
  #       property: db-password
  data: []

# =============================================================================
# Environment
# =============================================================================
# -- Environment variables set directly on the container (plain text, non-sensitive)
# Sensitive values should use externalSecret instead.
# Example:
# env:
#   - name: TZ
#     value: "America/Chicago"
#   - name: NODE_ENV
#     value: "production"
env: []

# =============================================================================
# Pod Security
# =============================================================================
podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# =============================================================================
# Pod Annotations
# =============================================================================
podAnnotations: {}

# =============================================================================
# Probes
# =============================================================================
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# =============================================================================
# Resource Limits & Requests
# =============================================================================
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# =============================================================================
# Volumes
# =============================================================================
# -- Volume mounts for the container
# Example:
# volumeMounts:
#   - name: data
#     mountPath: /app/data
volumeMounts: []

# -- Volumes for the pod
# Example:
# volumes:
#   - name: data
#     persistentVolumeClaim:
#       claimName: my-app-data
volumes: []

# =============================================================================
# HorizontalPodAutoscaler
# =============================================================================
autoscaling:
  # -- Enable HPA
  enabled: false
  # -- Minimum replicas
  minReplicas: 1
  # -- Maximum replicas
  maxReplicas: 5
  # -- CPU utilization target percentage
  targetCPUUtilizationPercentage: 80
  # -- Memory utilization target percentage
  targetMemoryUtilizationPercentage: 80
  # -- Advanced HPA behavior configuration
  behavior: {}

# =============================================================================
# Scheduling
# =============================================================================
nodeSelector: {}

tolerations: []

affinity: {}

# Windrose dedicated server production chart.
# Uses the indifferentbroccoli/windrose-server-docker image mirrored to the
# homelab registry.  The image's own entrypoint (/home/steam/server/init.sh)
# must run as root briefly to `usermod` the steam user to PUID/PGID, then it
# `su`s to steam before launching Wine.  Do NOT override command/args and do
# NOT set runAsUser: 1000 at the container level — that would break the
# usermod/su flow and prevent the Wine server from starting.
#
# This is the only homelab chart that intentionally starts as root inside the
# container; see policies/windrose-podsecurity.yaml for the namespace-level
# Pod Security baseline exemption.
app-template:
  controllers:
    main:
      strategy: Recreate
      replicas: 1
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          image:
            repository: indifferentbroccoli/windrose-server-docker
            tag: latest
            pullPolicy: IfNotPresent
          env:
            TZ: America/Chicago
            PUID: "1000"
            PGID: "1000"
            INVITE_CODE:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: invite-code
            SERVER_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: server-password
            SERVER_NAME:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: owner-name
            USE_DIRECT_CONNECTION: "false"
            P2P_PROXY_ADDRESS: "127.0.0.1"
            USER_SELECTED_REGION: ""
            MAX_PLAYERS: "4"
            GENERATE_SETTINGS: "true"
            WINDROSE_PLUS_ENABLED: "false"
            UE4SS_ENABLED: "false"
            UPDATE_ON_START: "false"
          command:
            - /bin/bash
            - -c
            - |
              # Patch WorldDescription.json to "Easy" (calm seas) whenever it
              # appears. The image's start.sh generates it with "Medium" during
              # first-boot, then launches the server which reads it to create
              # the world. This loop ensures "Easy" is written before the
              # server reads it for world creation.
              (
                while true; do
                  WD=$(find /home/steam/server-files/R5/Saved/SaveProfiles -name WorldDescription.json 2>/dev/null | head -1)
                  if [ -n "$WD" ]; then
                    cur=$(tr -d '\r' < "$WD" | jq -r '.WorldDescription.WorldPresetType // ""')
                    if [ "$cur" != "Easy" ]; then
                      tr -d '\r' < "$WD" | jq '.WorldDescription.WorldPresetType = "Easy" | .WorldDescription.WorldSettings = {}' > "${WD}.tmp" && mv "${WD}.tmp" "$WD"
                    fi
                  fi
                  sleep 1
                done
              ) &
              exec /home/steam/server/init.sh
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 1000m
              memory: 4Gi
            limits:
              cpu: 2000m
              memory: 8Gi
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - 'pgrep "wine" > /dev/null'
                initialDelaySeconds: 360
                periodSeconds: 60
                timeoutSeconds: 10
                failureThreshold: 3
            readiness:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - 'pgrep "wine" > /dev/null'
                initialDelaySeconds: 360
                periodSeconds: 30
                timeoutSeconds: 10
                failureThreshold: 3
            startup:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - 'pgrep "wine" > /dev/null'
                failureThreshold: 120
                periodSeconds: 5
                timeoutSeconds: 10
          ports:
            - name: game-tcp
              containerPort: 7777
              protocol: TCP
            - name: game-udp
              containerPort: 7777
              protocol: UDP
  service:
    main:
      primary: true
      controller: main
      ports:
        game-tcp:
          port: 7777
          protocol: TCP
        game-udp:
          port: 7777
          protocol: UDP
  persistence:
    data:
      type: persistentVolumeClaim
      enabled: true
      accessMode: ReadWriteOnce
      size: 50Gi
      storageClass: standard-rwo
      advancedMounts:
        main:
          main:
            - path: /home/steam/server-files
  defaultPodOptions:
    dnsPolicy: ClusterFirst
    nodeSelector:
      kubernetes.io/hostname: cyndaquil
    annotations:
      operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/faayy3w4hnmhnifqsr7pmf5xxe"
      operator.1password.io/item-name: "secrets"

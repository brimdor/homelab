apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: windrose
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://git.eaglepass.io/ops/homelab.git
    targetRevision: master
    path: apps/windrose
  destination:
    server: https://kubernetes.default.svc
    namespace: windrose
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true

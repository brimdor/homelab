app-template:
  controllers:
    main:
      containers:
        main:
          image:
            repository: docker.io/ollama/ollama
            tag: 0.1.29
    ui:
      containers:
        main:
          image:
            repository: ghcr.io/open-webui/open-webui
            tag: latest
          env:
            OLLAMA_BASE_URL: http://ollama:11434
  service:
    main:
      ports:
        http:
          port: 11434
          protocol: HTTP
    ui:
      controller: ui
      ports:
        http:
          port: 8080
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
      - host: &ollamaHost ollama.eaglepass.io
        paths:
          - path: /
            pathType: Prefix
            service:
              name: main
              port:
                number: 11434  # Use actual port number
      - host: &uiHost ai.eaglepass.io
        paths:
          - path: /
            pathType: Prefix
            service:
              name: ui
              port:
                number: 8080  # Use actual port number
      tls:
        - hosts:
            - *ollamaHost
            - *uiHost
          secretName: ollama-tls-certificate
  persistence:
    data:
      enabled: true
      accessMode: ReadWriteOnce
      size: 200Gi
      advancedMounts:
        main:
          main:
            - type: nfs
              server: 10.0.50.3
              path: /mnt/user/ollama
              mountPath: /root/.ollama
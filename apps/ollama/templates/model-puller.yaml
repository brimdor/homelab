{{- /*
Model Puller - Uses modular script templates from:
  - _common.tpl      : Shared utilities (wait, pull_with_retry)
  - _model-echo.tpl  : Echo model creation
  - _model-humble.tpl: Humble model creation
  - _entrypoint.tpl  : Orchestration script
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-model-puller-script
  namespace: ollama
  annotations:
    argocd.argoproj.io/sync-wave: "5"
data:
  pull-models.sh: |
{{ include "ollama.script.entrypoint" . | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-model-puller
  namespace: ollama
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama-model-puller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-model-puller
      annotations:
        checksum/config: {{ include "ollama.script.entrypoint" . | sha256sum }}
    spec:
      initContainers:
        - name: model-downloader
          image: curlimages/curl:8.12.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              mkdir -p /models
{{- if .Values.modelPuller.downloads }}
{{- range .Values.modelPuller.downloads }}
              if [ -s "{{ .dest }}" ]; then
                echo "Already present: {{ .dest }}"
              else
                echo "Downloading {{ .url }} -> {{ .dest }}"
                curl -L --fail --retry 5 --retry-delay 5 -C - \
                  ${HF_TOKEN:+-H "Authorization: Bearer ${HF_TOKEN}"} \
                  -o "${{.dest}}.part" "{{ .url }}" && mv "${{.dest}}.part" "{{ .dest }}"
              fi
{{- end }}
{{- else }}
              echo "No downloads configured."
{{- end }}
              echo "Downloader finished; leaving init container."
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: huggingface-token
          volumeMounts:
            - name: script-volume
              mountPath: /scripts
            - name: models
              mountPath: /models

      containers:
        - name: model-puller
          image: ollama/ollama:latest
          command: ["/bin/sh", "/scripts/pull-models.sh"]
          env:
            - name: OLLAMA_HOST
              value: "http://ollama:11434"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: huggingface-token
          volumeMounts:
            - name: script-volume
              mountPath: /scripts
            - name: models
              mountPath: /models
      volumes:
        - name: script-volume
          configMap:
            name: ollama-model-puller-script
            defaultMode: 0755
        - name: models
          emptyDir: {}

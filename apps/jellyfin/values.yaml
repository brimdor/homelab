app-template:
  controllers:
    main:
      containers:
        main:
          image:
            repository: lscr.io/linuxserver/jellyfin
            tag: latest
            pullPolicy: Always
          env:
            PUID: "99"
            PGID: "100"
            TZ: "America/Chicago"
          resources:
            limits:
              cpu: 2
              memory: "4096Mi"
            requests:
              cpu: 500m
              memory: "1024Mi"
  service:
    main:
      primary: true
      ports:
        http:
          port: 8096
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &jellyfinHost jellyfin.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: 8096
      tls:
        - hosts:
            - *jellyfinHost
          secretName: jellyfin-tls-certificate
  persistence:
    config:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/jellyfin
      advancedMounts:
        main:
          main:
            - path: /config
    transcode:
      type: emptyDir
      advancedMounts:
        main:
          main:
            - path: /config/transcodes
    nfs-movies:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/movies
      advancedMounts:
        main:
          main:
            - path: /data/movies
    nfs-tv:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/tv
      advancedMounts:
        main:
          main:
            - path: /data/tv
    nfs-music:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/music
      advancedMounts:
        main:
          main:
            - path: /data/music
    nfs-movies-custom:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/movies_custom
      advancedMounts:
        main:
          main:
            - path: /data/movies_custom
    nfs-tv-custom:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/tv_custom
      advancedMounts:
        main:
          main:
            - path: /data/tv_custom
  defaultPodOptions:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - sprigatito
    tolerations:
      - key: dedicated
        operator: Equal
        value: sprigatito
        effect: NoSchedule

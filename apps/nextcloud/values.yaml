# Official Nextcloud Helm chart values (starting point)
# This file assumes static PVs/PVCs will be created and bound to the
# NFS subpaths under /mnt/user/nextcloud on the NAS (server 10.0.40.3).
#
# Important: The official chart layout may differ depending on chart
# version. This file uses the common keys `persistence.existingClaim` and
# `mariadb.primary.persistence.existingClaim`. If your chart version uses
# different keys, adapt accordingly.


# Nextcloud application settings (chart-specific)
nextcloud:
  # Admin bootstrap (override via secret if desired)
  # username: admin
  # password: changeme

  # Extra volumes allow mounting a separate PVC for the Nextcloud config
  # directory. This maps the PVC `nextcloud-config` into the Pod at
  # /var/www/html/config.
  extraVolumes:
    - name: nextcloud-config
      persistentVolumeClaim:
        claimName: nextcloud-config
  extraVolumeMounts:
    - name: nextcloud-config
      mountPath: /var/www/html/config

# Use the bundled MariaDB (chart may use bitnami/mariadb). We point its
# persistence to an existing PVC created on the NFS export.

# Use the bundled MariaDB chart (bitnami). We disable the internalDatabase
# helper to avoid conflicts and point mariadb to the pre-created PVC and
# secret.
internalDatabase:
  enabled: false

mariadb:
  enabled: true
  primary:
    persistence:
      enabled: true
      existingClaim: nextcloud-mysql
  # The secret must exist in the `nextcloud` namespace and contain the
  # required keys for the bitnami mariadb chart (mariadb-root-password,
  # mariadb-password). We'll create this secret directly in-cluster.
  auth:
    existingSecret: nextcloud-db-secret

# Example resource sizing (tweak to your environment)

# Persistence for the Nextcloud data directory (binds to PV/PVC created
# earlier: nextcloud-data)
persistence:
  enabled: true
  existingClaim: nextcloud-data
  accessMode: ReadWriteMany
  size: 50Gi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Service type: set to ClusterIP for internal access; change to LoadBalancer
# or Ingress values if you expose Nextcloud externally.
service:
  type: ClusterIP

createNamespace: false
createPVs: true
createPVCs: true

nfs:
  server: 10.0.40.3
  basePath: /mnt/user/nextcloud
  storageClass: nfs

nextcloud:
  image:
    registry: docker.io
    repository: library/nextcloud
    flavor: apache

  replicaCount: 1

  podAnnotations:
    operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/npvlyfo7z6mjr6mysjlhyshxtu"
    operator.1password.io/item-name: "secrets"

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    path: /
    pathType: Prefix
    tls:
      - secretName: nextcloud-tls-certificate
        hosts:
          - nextcloud.eaglepass.io

  phpClientHttpsFix:
    enabled: true
    protocol: https

  nextcloud:
    host: nextcloud.eaglepass.io
    trustedDomains:
      - nextcloud.eaglepass.io
      - nextcloud.kube.home
    existingSecret:
      enabled: true
      secretName: secrets
      usernameKey: admin-username
      passwordKey: admin-password
    securityContext:
      runAsUser: 33
      runAsGroup: 33
      runAsNonRoot: true

  internalDatabase:
    enabled: false

  externalDatabase:
    enabled: true
    type: mysql
    database: nextcloud
    host: nextcloud-mariadb
    existingSecret:
      enabled: true
      secretName: secrets
      usernameKey: username
      passwordKey: password

  mariadb:
    enabled: true
    architecture: standalone
    auth:
      database: nextcloud
      username: nextcloud
      existingSecret: secrets
    primary:
      podAnnotations:
        operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/npvlyfo7z6mjr6mysjlhyshxtu"
        operator.1password.io/item-name: "secrets"
      persistence:
        enabled: true
        existingClaim: nextcloud-mysql-root
        subPath: mysql

  persistence:
    enabled: true
    existingClaim: nextcloud-config
    nextcloudData:
      enabled: true
      existingClaim: nextcloud-data

  startupProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 360
    successThreshold: 1

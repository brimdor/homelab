apiVersion: v1
kind: Secret
metadata:
  name: nextcloud-db-secret
  namespace: nextcloud
type: Opaque
data:
  # Base64-encoded values. Replace these with secure values before applying.
  # Example (local): echo -n 'strong-root-pass' | base64
  mysql-root-password: REPLACE_BASE64
  mysql-password: REPLACE_BASE64
  mysql-user: cm9vdA== # 'root' as example (base64)
  mysql-database: bmV4dGNsb3Vk # 'nextcloud' (base64)

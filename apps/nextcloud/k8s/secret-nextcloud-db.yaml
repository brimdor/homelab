apiVersion: v1
kind: Secret
metadata:
  name: nextcloud-db-secret
  namespace: nextcloud
type: Opaque
stringData:
  # Use stringData so values do not need to be base64 encoded in this file.
  # Replace the placeholder passwords with strong values before applying.
  mariadb-root-password: "changeme-root"
  mariadb-password: "changeme"
  mariadb-database: "nextcloud"
  mariadb-user: "nextcloud"

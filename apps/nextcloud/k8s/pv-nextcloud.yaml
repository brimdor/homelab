apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-nextcloud-data
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: 10.0.40.3
    path: /mnt/user/nextcloud/data
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-nextcloud-config
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: 10.0.40.3
    path: /mnt/user/nextcloud/config
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-nextcloud-mysql
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: 10.0.40.3
    path: /mnt/user/nextcloud/mysql

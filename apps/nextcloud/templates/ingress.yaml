{{/* Ingress template for nextcloud; reads values from app-template.ingress.main */}}
{{ $ing := index .Values "app-template" "ingress" "main" }}
{{ if $ing.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextcloud
  namespace: {{ .Release.Namespace }}
  annotations:
{{ toYaml $ing.annotations | indent 4 }}
spec:
  {{ $class := index $ing "className" }}
  {{ if $class }}
  ingressClassName: {{ $class | quote }}
  {{ end }}
  {{ $hosts := index $ing "hosts" }}
  {{ $host0 := index $hosts 0 }}
  {{ $paths := index $host0 "paths" }}
  {{ $path0 := index $paths 0 }}
  {{ $tls := index $ing "tls" }}
  {{ $tls0 := index $tls 0 }}
  tls:
    - hosts:
        - {{ index $host0 "host" | quote }}
      secretName: {{ index $tls0 "secretName" | quote }}
  rules:
    - host: {{ index $host0 "host" | quote }}
      http:
        paths:
          - path: {{ index $path0 "path" | quote }}
            pathType: {{ default "Prefix" (index $path0 "pathType") }}
            backend:
              service:
                name: nextcloud
                port:
                  number: 8080
{{ end }}

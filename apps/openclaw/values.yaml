# https://github.com/bjw-s-labs/helm-charts/blob/main/charts/library/common/values.yaml for all options
# OpenClaw Docs: https://docs.openclaw.ai/
app-template:
  controllers:
    main:
      strategy: RollingUpdate
      initContainers:
        set-config:
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: "latest"
            pullPolicy: Always
          command:
            - /bin/sh
            - -lc
          args: |
            set -euo pipefail
            node <<'NODE'
            const fs = require('fs')

            const p = '/home/node/.openclaw/openclaw.json'
            let j = {}

            try {
              j = JSON.parse(fs.readFileSync(p, 'utf8'))
            } catch (e) {
              j = {}
            }

            j.gateway = j.gateway || {}
            j.gateway.mode = j.gateway.mode || 'local'
            j.gateway.port = j.gateway.port || 18789
            j.gateway.bind = 'lan'
            j.gateway.auth = j.gateway.auth || {}
            j.gateway.auth.mode = j.gateway.auth.mode || 'token'
            j.gateway.auth.token = '${OPENCLAW_GATEWAY_TOKEN}'

            j.agents = j.agents || {}
            j.agents.defaults = j.agents.defaults || {}
            j.agents.defaults.workspace = '/home/node/.openclaw/workspace'

            if (fs.existsSync(p)) {
              fs.copyFileSync(p, `${p}.pre-helm-init.bak`)
            }
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n')
            console.log(`wrote ${p}`)
            NODE
      containers:
        main:
          nameOverride: main
          image:
            repository: ghcr.io/openclaw/openclaw
            tag: "latest"
            pullPolicy: Always
          env:
            HOME: "/home/node"
            TERM: "xterm-256color"
            TZ: "America/Chicago"
            OPENCLAW_GATEWAY_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: "secrets"
                  key: "gateway-token"
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false

  service:
    main:
      primary: true
      ports:
        gateway:
          port: 18789
          protocol: HTTP
        bridge:
          port: 18790
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &Host openclaw.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: 18789
      tls:
        - hosts:
            - *Host
          secretName: openclaw-tls-certificate

  persistence:
    data:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/openclaw
      advancedMounts:
        main:
          init-dirs:
            - path: /data
          set-config:
            - path: /home/node/.openclaw
          main:
            - path: /home/node/.openclaw

  defaultPodOptions:
    annotations:
      operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/2d2xphod42xwz2eoxs3tyyx7je"
      operator.1password.io/item-name: "secrets"

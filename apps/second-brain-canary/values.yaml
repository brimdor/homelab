app-template:
  controllers:
    main:
      strategy: RollingUpdate
      replicas: 1
      containers:
        main:
          nameOverride: second-brain-canary
          image:
            repository: 10.0.20.11:32309/second-brain
            tag: "2026-04-12-0041-v1-canary"
            pullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          workingDir: /app
          env:
            NODE_ENV: production
            PORT: "3000"
            TZ: America/Chicago
          envFrom:
            - secretRef:
                name: second-brain-canary-secrets
          probes:
            liveness:
              enabled: true
              spec:
                httpGet:
                  path: /health
                  port: 3000
                initialDelaySeconds: 15
                periodSeconds: 30
            readiness:
              enabled: true
              spec:
                httpGet:
                  path: /health
                  port: 3000
                initialDelaySeconds: 5
                periodSeconds: 10
          resources:
            limits:
              cpu: 2
              memory: 2048Mi
            requests:
              cpu: 0.25
              memory: 512Mi
  service:
    main:
      primary: true
      ports:
        http:
          port: 3000
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - host: brain-canary.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - brain-canary.eaglepass.io
          secretName: second-brain-canary-tls

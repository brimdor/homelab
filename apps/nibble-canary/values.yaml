app-template:
  controllers:
    main:
      strategy: RollingUpdate
      replicas: 1
      containers:
        main:
          image:
            repository: 10.0.20.11:32309/nibble
            tag: "issue-22-canary"
            pullPolicy: Always
          # roll: 2026-04-30-ssr-fix
          env:
            TZ: America/Chicago
          probes:
            liveness:
              enabled: true
              type: HTTP
              path: /
              spec:
                initialDelaySeconds: 15
                periodSeconds: 10
            readiness:
              enabled: true
              type: HTTP
              path: /
              spec:
                initialDelaySeconds: 5
                periodSeconds: 10

  service:
    main:
      primary: true
      ports:
        http:
          port: 3000
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: nibble-canary.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - nibble-canary.eaglepass.io
          secretName: nibble-canary-tls

  networkpolicies:
    main:
      enabled: true
      controller: main
      policyTypes:
        - Ingress
        - Egress
      rules:
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    name: ingress-nginx
            ports:
              - protocol: TCP
                port: 3000
        egress:
          # DNS resolution (CoreDNS in kube-system)
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: kube-system
            ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
          # API egress — Ollama (AI inference)
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: ollama
            ports:
              - protocol: TCP
                port: 11434
          # T11: Worker egress — Redis (BullMQ queue backend)
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: redis
            ports:
              - protocol: TCP
                port: 6379
          # T11: Worker egress — PostgreSQL (image metadata DB)
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: postgres
            ports:
              - protocol: TCP
                port: 5432
          # T11: Worker egress — Object storage (S3-compatible, image variants)
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: minio
            ports:
              - protocol: TCP
                port: 9000

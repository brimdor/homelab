app-template:
  controllers:
    main:
      strategy: RollingUpdate
      replicas: 1
      containers:
        main:
          image:
            repository: 10.0.20.18:32309/nibble
            tag: "issue-13-canary"
            pullPolicy: Always
          env:
            TZ: America/Chicago
          probes:
            liveness:
              enabled: true
              type: HTTP
              path: /
              spec:
                initialDelaySeconds: 15
                periodSeconds: 10
            readiness:
              enabled: true
              type: HTTP
              path: /
              spec:
                initialDelaySeconds: 5
                periodSeconds: 10

  service:
    main:
      primary: true
      ports:
        http:
          port: 3000
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: nibble-canary.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - nibble-canary.eaglepass.io
          secretName: nibble-canary-tls

  # Tier 2: NetworkPolicy for pod isolation (defense-in-depth)
  networkpolicies:
    main:
      enabled: true
      controller: main
      policyTypes:
        - Ingress
        - Egress
      rules:
        ingress:
          # Allow ingress only from ingress-nginx controller namespace
          - from:
              - namespaceSelector:
                  matchLabels:
                    name: ingress-nginx
            ports:
              - protocol: TCP
                port: 3000
        egress:
          # Allow DNS resolution (required for all outbound connections)
          - to:
              - namespaceSelector: {}
            ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
          # Allow egress to Ollama service (if backend proxy calls Ollama)
          # Adjust namespace/port based on actual Ollama deployment location
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: ollama
            ports:
              - protocol: TCP
                port: 11434
app-template:
  controllers:
    main:
      strategy: RollingUpdate
      replicas: 1
      containers:
        main:
          image:
            repository: 10.0.20.11:32309/nibble
            tag: "issue-22-canary"
            pullPolicy: Always
          # roll: 2026-04-30-ssr-fix
          env:
            TZ: America/Chicago
          probes:
            liveness:
              enabled: true
              type: HTTP
              path: /
              spec:
                initialDelaySeconds: 15
                periodSeconds: 10
            readiness:
              enabled: true
              type: HTTP
              path: /
              spec:
                initialDelaySeconds: 5
                periodSeconds: 10
        # T10: Image optimization worker — sidecar pattern in same pod
        worker:
          image:
            repository: 10.0.20.11:32309/nibble
            tag: "issue-23-canary"
            pullPolicy: Always
          command:
            - node
            - dist/worker.js
          env:
            TZ: America/Chicago
            IMAGE_OPTIMIZATION_ENABLED: "true"
            IMAGE_WORKER_CONCURRENCY: "4"
            IMAGE_QUEUE_TIMEOUT_MS: "30000"
            IMAGE_QUALITY_WEBP: "85"
            IMAGE_QUALITY_AVIF: "80"
            IMAGE_MAX_WIDTH: "1920"
            IMAGE_MAX_HEIGHT: "1080"
            IMAGE_MAX_FILE_SIZE_MB: "10"
          probes:
            liveness:
              enabled: true
              type: HTTP
              path: /health/liveness
              port: 3001
              spec:
                initialDelaySeconds: 15
                periodSeconds: 10
            readiness:
              enabled: true
              type: HTTP
              path: /health/readiness
              port: 3001
              spec:
                initialDelaySeconds: 5
                periodSeconds: 10
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 250m
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000

  defaultPodOptions:
    securityContext:
      fsGroup: 1000

  persistence:
    # Shared emptyDir volume for temp image processing between API and worker
    image-tmp:
      type: emptyDir
      advancedMounts:
        main:
          main:
            - path: /tmp/image-processing
          worker:
            - path: /tmp/image-processing

  service:
    main:
      primary: true
      ports:
        http:
          port: 3000
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: nibble-canary.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - nibble-canary.eaglepass.io
          secretName: nibble-canary-tls

  networkpolicies:
    main:
      enabled: true
      controller: main
      policyTypes:
        - Ingress
        - Egress
      rules:
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    name: ingress-nginx
            ports:
              - protocol: TCP
                port: 3000
        egress:
          # DNS resolution (CoreDNS in kube-system)
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: kube-system
            ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
          # API egress — Ollama (AI inference)
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: ollama
            ports:
              - protocol: TCP
                port: 11434
          # T11: Worker egress — Redis (BullMQ queue backend)
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: redis
            ports:
              - protocol: TCP
                port: 6379
          # T11: Worker egress — PostgreSQL (image metadata DB)
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: postgres
            ports:
              - protocol: TCP
                port: 5432
          # T11: Worker egress — Object storage (S3-compatible, image variants)
          - to:
              - namespaceSelector:
                  matchLabels:
                    name: minio
            ports:
              - protocol: TCP
                port: 9000
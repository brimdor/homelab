# ConfigMap containing patches applied at pod startup to fix Emby buffering.
#
# Four issues are addressed by this patch, observed on 2026-06-10:
#
#  1. Audio transcoder crashes during 4K HDR playback
#     --------------------------------------------------------
#     EAC3 5.1 -> AC3 5.1 transcoding (the default in Emby) causes
#     ffmpeg to abort with "Too many packets buffered for output
#     stream 1:1" every few minutes. The muxer's default packet
#     queue (1000 frames) is overflowed because AC3 frames are
#     rigid 32 ms packets while video segments are 3 s, so audio
#     packets pile up in the queue waiting for the next muxer
#     boundary. Each crash forces a fresh ffmpeg to spin up,
#     which re-buffers the player.
#
#     Fix: disable throttling, set HWA=2 (NVENC), keep H264Crf=20.
#
#  2. /config/transcoding-temp/ accumulates session directories
#     ---------------------------------------------------------
#     Observed 17 GiB of leftover session dirs on the 40 GiB
#     /config PVC (71% used, 12 GiB free). Emby's built-in
#     cleanup is unreliable, and the emptyDir workaround used
#     by the Jellyfin chart is not applied here.
#
#     Fix: cleanup-transcode-temp.sh runs as a postStart hook
#     and as a Kubernetes CronJob every 30 minutes. Session
#     directories older than 2 hours (or any dir that does NOT
#     contain an .m3u8 being actively written to) are removed.
#
#  3. Throughput: 4K HDR transcode at 11.6 Mbps overloads GTX 1650
#     ---------------------------------------------------------
#     Observed 5 ffmpeg crashes between 12:10 and 12:37 (cluster
#     local time) on a single 4K HDR HEVC transcoded to H.264 at
#     11.6 Mbps / 4K output width. The GTX 1650's NVENC can do
#     2-3 simultaneous 4K H.264 encodes, but Emby was running
#     12 simultaneous ffmpeg processes per session (1 video +
#     1 audio + 3 subtitle extractions + HLS segments) which
#     overloaded the encoder queue and triggered the audio
#     muxer overflow.
#
#     Fix: lower the per-session concurrency envelope by
#     (a) bumping EncodingThreadCount to 2 (was 0=auto, which
#         could pin all 4 cores per session),
#     (b) capping SimultaneousStreamLimit to 3 in system.xml
#         (was 0=unlimited),
#     (c) lowering the global remote bitrate cap from 12 Mbps
#         to 8 Mbps (8 Mbps is enough for 1080p HEVC, which
#         is the realistic delivery target for the LAN client
#         on 1 Gbps),
#     (d) marking the LAN as "local" via LocalNetworkSubnets
#         so Emby treats the 10.0.0.0/16 LAN clients as local
#         and applies the local-network policy (which is more
#         generous than the remote one).
#
#  4. Direct-stream: 4K HDR over NFS gets ~50 MB/s cold, stalls
#     --------------------------------------------------------
#     Observed on 2026-06-10 14:10:55, a Mac/Firefox client
#     direct-streamed a 2.4 GB MKV from NFS at 10.0.40.3 with
#     byte-range requests. Cold read throughput is 97 MB/s
#     (single-stream) or 50 MB/s per stream with 2 concurrent
#     reads. Direct-stream of a 4K HDR 18.6 Mbps source is
#     bottlenecked by the NFS read when the page cache is cold
#     or when the client aggressively re-issues byte-range
#     requests after seeking. We can't fix the Unraid NFS
#     throughput from the chart, but we can:
#
#     Fix: add a cache-warm.sh that runs as a postStart hook
#     to pre-populate the page cache with the recently-played
#     items from the last 7 days (read 64 MiB from the start
#     of each file to /dev/null). This warms the kernel page
#     cache so the first reads of those files after a pod
#     restart come from RAM, not NFS.
#
#  5. Health probes and pod restarts: already addressed in
#     commit f8ea61a7.
#
# The config files are owned by the patch because the bjw-s
# app-template copies ConfigMap data into a read-only mount;
# the postStart hook then `cp -f` it onto the writable
# /config/config/encoding.xml and /config/config/system.xml so
# Emby can still persist any future changes from the Web UI.
apiVersion: v1
kind: ConfigMap
metadata:
  name: emby-config-patch
  namespace: emby
  labels:
    app.kubernetes.io/name: emby
    app.kubernetes.io/instance: emby
data:
  encoding.xml: |
    <?xml version="1.0"?>
    <EncodingOptions xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!-- EncodingThreadCount: was 0 (= auto / all cores).
           On a 4-core sprigatito this lets one transcode pin
           all 4 cores, starving the .NET EmbyServer process
           and the other 2 NVENC sessions. 2 leaves headroom. -->
      <EncodingThreadCount>2</EncodingThreadCount>
      <ExtractionThreadCount>1</ExtractionThreadCount>
      <TranscodingTempPath>/config/transcoding-temp</TranscodingTempPath>
      <DownMixAudioBoost>1</DownMixAudioBoost>
      <!-- Throttle OFF: BySegmentRequest is the default
           ThrottlingMethod, but when the transcoder is gated
           on per-segment requests the muxer has to finish a
           full 3 s audio frame queue before serving the next
           segment, which is the exact condition that overflows
           ffmpeg's default 1000-packet muxing queue. -->
      <EnableThrottling>false</EnableThrottling>
      <ThrottleBufferSize>60</ThrottleBufferSize>
      <ThrottleHysteresis>4</ThrottleHysteresis>
      <ThrottlingMethod>BySegmentRequest</ThrottlingMethod>
      <H264Crf>20</H264Crf>
      <H264Preset>veryfast</H264Preset>
      <EnableHardwareEncoding>true</EnableHardwareEncoding>
      <EnableSubtitleExtraction>false</EnableSubtitleExtraction>
      <CodecConfigurations />
      <!-- 1 = NVENC, 2 = QSV, 4 = VAAPI, 8 = VideoToolbox, 16 = AMF
           (Flag enum; 0 = none). The LSIO image also reads
           FFMPEG_HWACCEL=cuda env var, but setting this
           explicitly avoids the "1 = disabled" sentinel in
           older Emby versions. -->
      <HardwareAccelerationMode>2</HardwareAccelerationMode>
      <EnableHardwareToneMapping>true</EnableHardwareToneMapping>
      <EnableSoftwareToneMapping>false</EnableSoftwareToneMapping>
      <EnableHevcEncoding>false</EnableHevcEncoding>
    </EncodingOptions>

  # system.xml overrides: the simultaneous-stream cap, the
  # remote bitrate ceiling, and the local-network subnet list.
  # These three together keep the GPU from being asked to do
  # 4K HDR at 11.6 Mbps while the LAN client gets the same
  # generous local-network policy it would on a 1 Gbps LAN.
  system.xml: |
    <?xml version="1.0"?>
    <ServerConfiguration xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
      <!-- Was 0 (= unlimited). The GTX 1650 on sprigatito can
           sustain 2-3 simultaneous 4K H.264 NVENC sessions.
           Above 3, the audio muxer queue overflows and ffmpeg
           crashes every few minutes (see issue 1). -->
      <SimultaneousStreamLimit>3</SimultaneousStreamLimit>
      <!-- Was 12000000 (12 Mbps). 8 Mbps is sufficient for
           1080p HEVC delivery which is the realistic target
           for the LAN client; capping at 8 forces 4K sources
           to downscale rather than attempt 4K-output H.264 at
           11.6 Mbps. -->
      <RemoteClientBitrateLimit>8000000</RemoteClientBitrateLimit>
      <!-- Was empty. The 10.0.0.0/16 LAN covers the 10.0.1.x
           clients (FireTV at 10.0.1.229, onn box at 10.0.5.61,
           etc.). Without this, every client is treated as
           "remote" and Emby applies the conservative remote
           bitrate policy even when serving over 1 Gbps LAN. -->
      <LocalNetworkSubnets>
        <string>10.0.0.0/16</string>
        <string>192.168.0.0/16</string>
        <string>172.16.0.0/12</string>
      </LocalNetworkSubnets>
    </ServerConfiguration>

  # See header comment for the rationale.
  cleanup-transcode-temp.sh: |
    #!/bin/sh
    set -eu
    TEMP_DIR="/config/transcoding-temp"
    MAX_AGE_HOURS="${EMBY_TRANSCODE_TEMP_MAX_AGE_HOURS:-2}"
    if [ ! -d "$TEMP_DIR" ]; then
      echo "[cleanup] $TEMP_DIR does not exist; nothing to do"
      exit 0
    fi
    NOW=$(date +%s)
    REMOVED=0
    KEPT=0
    for d in "$TEMP_DIR"/*; do
      [ -d "$d" ] || continue
      # If the directory contains an m3u8 modified within the
      # last 30 seconds, it is an active session. Skip it.
      LATEST_M3U8=$(find "$d" -maxdepth 2 -name '*.m3u8' -printf '%T@\n' 2>/dev/null | sort -n | tail -1)
      if [ -n "$LATEST_M3U8" ]; then
        AGE=$(awk -v now="$NOW" -v m="$LATEST_M3U8" 'BEGIN { printf "%d", now - m }')
        if [ "$AGE" -lt 30 ]; then
          KEPT=$((KEPT + 1))
          continue
        fi
      fi
      MTIME=$(stat -c %Y "$d" 2>/dev/null || echo 0)
      AGE_HOURS=$(( (NOW - MTIME) / 3600 ))
      if [ "$AGE_HOURS" -ge "$MAX_AGE_HOURS" ]; then
        rm -rf "$d" && REMOVED=$((REMOVED + 1))
      else
        KEPT=$((KEPT + 1))
      fi
    done
    echo "[cleanup] removed=$REMOVED kept=$KEPT max_age_hours=$MAX_AGE_HOURS"

  # Cache warm: read the first 64 MiB of recently-played files
  # into the kernel page cache. This eliminates the cold-NFS
  # 50 MB/s throughput hit when a client direct-streams a 4K
  # MKV right after a pod restart.
  #
  # Sources: anything in /data/movies, /data/tv, /data/movies_custom,
  # /data/tv_custom that was modified in the last 7 days. We
  # read 64 MiB per file (about 4-8 seconds at 50 MB/s NFS) so
  # this is bounded to ~3-5 minutes for a typical library of
  # 50-100 recently-touched items.
  #
  # Excluded: files >40 GiB (mostly full 4K remux sets; warm-
  # reading them is wasteful and can starve the NFS server).
  cache-warm.sh: |
    #!/bin/sh
    set -eu
    WARM_BYTES="${EMBY_CACHE_WARM_BYTES:-67108864}"  # 64 MiB
    MAX_AGE_DAYS="${EMBY_CACHE_WARM_MAX_AGE_DAYS:-7}"
    MAX_FILE_BYTES="${EMBY_CACHE_WARM_MAX_FILE_BYTES:-42949672960}"  # 40 GiB
    ROOTS="/data/movies /data/tv /data/movies_custom /data/tv_custom /data/music"
    WARMED=0
    SKIPPED=0
    FAILED=0
    START=$(date +%s)
    TMP_LIST=$(mktemp)
    trap 'rm -f "$TMP_LIST"' EXIT
    # Build the candidate list first so the subshell in the
    # while loop doesn't lose the counters.
    for root in $ROOTS; do
      [ -d "$root" ] || continue
      find "$root" -type f \
        \( -name '*.mkv' -o -name '*.mp4' -o -name '*.m4v' -o -name '*.webm' \) \
        -mtime "-${MAX_AGE_DAYS}" \
        -size "-${MAX_FILE_BYTES}"c 2>/dev/null \
        -print0 >> "$TMP_LIST"
    done
    while IFS= read -r -d '' f; do
      if dd if="$f" of=/dev/null bs=1M count=64 status=none 2>/dev/null; then
        WARMED=$((WARMED + 1))
      else
        FAILED=$((FAILED + 1))
      fi
    done < "$TMP_LIST"
    END=$(date +%s)
    echo "[cache-warm] warmed=$WARMED skipped=$SKIPPED failed=$FAILED in $((END-START))s"

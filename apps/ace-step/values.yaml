app-template:
  controllers:
    main:
      containers:
        main:
          image:
            repository: mephist85/ace-step
            tag: latest
          env:
            PORT: 7865
            HF_HUB_ENABLE_HF_TRANSFER: 1
            NVIDIA_VISIBLE_DEVICES: all
            NVIDIA_DRIVER_CAPABILITIES: all
            TZ: America/Chicago
          # Using the command from the official Dockerfile
          command: ["python3", "acestep/gui.py", "--server_name", "0.0.0.0", "--bf16", "true"]
          resources:
            requests:
              cpu: 2000m
              memory: 8Gi
            limits:
              memory: 16Gi
      runtimeClassName: nvidia
      pod:
        # annotations:
        #   # Placeholder Item ID - User must update this unique ID from 1Password
        #   operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/ace_step_secrets_placeholder"
        #   operator.1password.io/item-name: "secrets"
        tolerations:
          - key: "dedicated"
            value: "arcanine"
            effect: "NoSchedule"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - "arcanine"

  service:
    main:
      controller: main
      ports:
        http:
          port: 7865

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      hosts:
        - host: ace-step.eaglepass.io
          paths:
            - path: /
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - ace-step.eaglepass.io
          secretName: ace-step-tls

  persistence:
    data:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/ace-step
      globalMounts:
        - path: /app/checkpoints
          subPath: checkpoints
        - path: /app/outputs
          subPath: outputs
    logs:
      type: emptyDir
      globalMounts:
        - path: /app/logs

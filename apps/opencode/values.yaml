app-template:
  controllers:
    main:
      replicas: 1
      containers:
        main:
          image:
            repository: ghcr.io/anomalyco/opencode
            tag: 0.0.0-beta-202603121038
            pullPolicy: IfNotPresent
          args:
            - web
            - --hostname
            - 0.0.0.0
            - --port
            - "4096"
            - --cors
            - https://opencode.eaglepass.io
          workingDir: /workspace
          env:
            TZ: America/Chicago
            OPENCODE_SERVER_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: username
            OPENCODE_SERVER_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: password
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 4096
                initialDelaySeconds: 20
                periodSeconds: 10
            readiness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 4096
                initialDelaySeconds: 10
                periodSeconds: 10
            startup:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: 4096
                failureThreshold: 30
                periodSeconds: 5
  service:
    main:
      primary: true
      type: ClusterIP
      ports:
        http:
          port: 4096
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: homelab-tunnel.eaglepass.io
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host opencode.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: 4096
      tls:
        - hosts:
            - *host
          secretName: opencode-tls-certificate
  persistence:
    data:
      type: emptyDir
      advancedMounts:
        main:
          main:
            - path: /workspace
  defaultPodOptions:
    annotations:
      operator.1password.io/item-path: vaults/4uaua4a45yuhnwhehp5bwylmti/items/shsxwdyma3wxwyfeiw6ekcefd4
      operator.1password.io/item-name: secrets

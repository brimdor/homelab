app-template:
  controllers:
    main:
      strategy: Recreate
      replicas: 1
      containers:
        main:
          image:
            repository: ghcr.io/anomalyco/opencode
            tag: latest
            pullPolicy: Always
          args:
            - serve
            - --hostname
            - 0.0.0.0
            - --port
            - "4096"
            - --cors
            - https://opencode.eaglepass.io
          env:
            TZ: America/Chicago
            OPENCODE_SERVER_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: username
            OPENCODE_SERVER_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: password
          probes:
            liveness:
              enabled: true
              type: TCP
              spec:
                initialDelaySeconds: 20
                periodSeconds: 15
                timeoutSeconds: 3
                failureThreshold: 6
            readiness:
              enabled: true
              type: TCP
              spec:
                initialDelaySeconds: 10
                periodSeconds: 10
                timeoutSeconds: 3
                failureThreshold: 6
            startup:
              enabled: true
              type: TCP
              spec:
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 60
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 4Gi
  service:
    main:
      primary: true
      ports:
        http:
          port: 4096
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: homelab-tunnel.eaglepass.io
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host opencode.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: 4096
      tls:
        - hosts:
            - *host
          secretName: opencode-tls
  defaultPodOptions:
    annotations:
      operator.1password.io/item-path: vaults/4uaua4a45yuhnwhehp5bwylmti/items/shsxwdyma3wxwyfeiw6ekcefd4
      operator.1password.io/item-name: secrets

app-template:
  controllers:
    main:
      strategy: Recreate
      replicas: 1
      containers:
        main:
          image:
            repository: docker.io/library/archlinux
            tag: latest
            pullPolicy: Always
          workingDir: /home/cody/workspace
          command:
            - /bin/bash
            - -lc
          args:
            - >-
              set -euo pipefail;
              if [ ! -s /etc/pacman.d/gnupg/pubring.kbx ]; then pacman-key --init; pacman-key --populate archlinux; fi;
              pacman -Sy --noconfirm archlinux-keyring;
              pacman -Syu --noconfirm --needed bash ca-certificates ca-certificates-utils curl gzip shadow tar which;
              if ! id -u cody >/dev/null 2>&1; then useradd -M -d /home/cody -u 1000 -s /bin/bash cody; fi;
              mkdir -p /home/cody/.config/opencode /home/cody/.local/share/opencode /home/cody/.opencode/bin /home/cody/workspace;
              chown -R 1000:1000 /home/cody/.local /home/cody/.opencode /home/cody/workspace;
              exec su -s /bin/bash cody -c 'set -euo pipefail; export HOME=/home/cody; export USER=cody; export SHELL=/bin/bash; export XDG_CONFIG_HOME=/home/cody/.config; export XDG_DATA_HOME=/home/cody/.local/share; export PATH=/home/cody/.opencode/bin:$PATH; curl -fsSL https://opencode.ai/install | bash -s -- --no-modify-path; exec /home/cody/.opencode/bin/opencode serve --hostname 0.0.0.0 --port 4096 --cors https://opencode.eaglepass.io'
          env:
            TZ: America/Chicago
            HOME: /home/cody
            USER: cody
            SHELL: /bin/bash
            XDG_CONFIG_HOME: /home/cody/.config
            XDG_DATA_HOME: /home/cody/.local/share
            OPENCODE_SERVER_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: username
            OPENCODE_SERVER_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: password
            OPENCODE_CONFIG_CONTENT: '{"$schema":"https://opencode.ai/config.json","autoupdate":false,"share":"disabled","server":{"hostname":"0.0.0.0","port":4096,"cors":["https://opencode.eaglepass.io"]},"provider":{"ollama":{"npm":"@ai-sdk/openai-compatible","name":"Ollama (cluster)","options":{"baseURL":"http://ollama.ollama.svc.cluster.local:11434/v1"},"models":{"gpt-oss:20b":{"name":"gpt-oss:20b"}}}},"model":"ollama/gpt-oss:20b","small_model":"ollama/gpt-oss:20b"}'
          probes:
            liveness:
              enabled: true
              type: TCP
              spec:
                initialDelaySeconds: 20
                periodSeconds: 15
                timeoutSeconds: 3
                failureThreshold: 6
            readiness:
              enabled: true
              type: TCP
              spec:
                initialDelaySeconds: 10
                periodSeconds: 10
                timeoutSeconds: 3
                failureThreshold: 6
            startup:
              enabled: true
              type: TCP
              spec:
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 60
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
  service:
    main:
      primary: true
      ports:
        http:
          port: 4096
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: homelab-tunnel.eaglepass.io
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host opencode.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: 4096
      tls:
        - hosts:
            - *host
          secretName: opencode-tls
  persistence:
    data:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 20Gi
      advancedMounts:
        main:
          main:
            - path: /home/cody/workspace
            - path: /home/cody/.local/share/opencode
            - path: /home/cody/.opencode
    home:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/opencode
      advancedMounts:
        main:
          main:
            - path: /home/cody/.config/opencode
  defaultPodOptions:
    annotations:
      operator.1password.io/item-path: vaults/4uaua4a45yuhnwhehp5bwylmti/items/shsxwdyma3wxwyfeiw6ekcefd4
      operator.1password.io/item-name: secrets
    securityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch

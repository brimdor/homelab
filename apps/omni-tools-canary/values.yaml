app-template:
  controllers:
    main:
      strategy: RollingUpdate
      replicas: 1
      containers:
        main:
          nameOverride: omni-tools-canary
          image:
            repository: iib0011/omni-tools
            tag: "latest"
            pullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            TZ: America/Chicago
          probes:
            liveness:
              enabled: true
              type: HTTP
              path: /
              spec:
                initialDelaySeconds: 10
                periodSeconds: 30
                timeoutSeconds: 5
                failureThreshold: 3
            readiness:
              enabled: true
              type: HTTP
              path: /
              spec:
                initialDelaySeconds: 3
                periodSeconds: 10
                timeoutSeconds: 3
                failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
  service:
    main:
      primary: true
      ports:
        http:
          port: 80
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - host: omni-tools-canary.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - omni-tools-canary.eaglepass.io
          secretName: omni-tools-canary-tls

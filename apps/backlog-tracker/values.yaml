app-template:
  defaultPodOptions:
    labels:
      app.kubernetes.io/name: backlog-tracker

  controllers:
    main:
      strategy: Recreate
      replicas: 1
      containers:
        main:
          image:
            repository: 10.0.20.11:32309/backlog-tracker
            tag: "2025-05-18-v20"
            pullPolicy: Always
          env:
            TZ: America/Chicago
            ENCRYPTION_MASTER_KEY:
              valueFrom:
                secretKeyRef:
                  name: backlog-tracker-secrets
                  key: encryption-master-key
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /_stcore/health
                  port: 8501
                initialDelaySeconds: 15
                periodSeconds: 10
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /_stcore/health
                  port: 8501
                initialDelaySeconds: 10
                periodSeconds: 10

  service:
    main:
      controller: main
      ports:
        http:
          port: 8501
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - host: backlog-tracker.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - backlog-tracker.eaglepass.io
          secretName: backlog-tracker-tls

  persistence:
    data:
      type: persistentVolumeClaim
      storageClass: standard-rwo
      accessMode: ReadWriteOnce
      size: 2Gi
      advancedMounts:
        main:
          main:
            - path: /app/data

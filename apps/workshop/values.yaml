app-template:
  controllers:
    main:
      replicas: 1
      initContainers:
        init-storage:
          image:
            repository: 10.0.20.11:32309/workshop
            tag: latest
            pullPolicy: Always
          command:
            - /bin/bash
            - -lc
          args:
            - >-
              mkdir -p
              /data/caches/opencode
              /data/caches/code-server
              /nfs/workspace
              /nfs/state/opencode
              /nfs/config/opencode
              /nfs/state/code-server
      containers:
        main:
          image:
            repository: 10.0.20.11:32309/workshop
            tag: latest
            pullPolicy: Always
          workingDir: /mnt/workshop-storage/workspace
          env:
            TZ: America/Chicago
            WORKSHOP_CACHE_SUBDIR: opencode
            WORKSHOP_PORT: "4096"
            WORKSHOP_HOSTNAME: 0.0.0.0
            WORKSHOP_CORS_ORIGINS: https://workshop.eaglepass.io,https://code-workshop.eaglepass.io
            OP_CONNECT_VAULT: Server
            OPENCODE_DISABLE_AUTOUPDATE: "true"
            GITHUB_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: github-token
            WORKSHOP_SSH_PRIVATE_KEY:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: ssh-private-key
            WORKSHOP_SSH_PUBLIC_KEY:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: ssh-public-key
            OP_SERVICE_ACCOUNT_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: op-service-account-token
          probes:
            startup:
              enabled: false
              custom: true
              spec:
                tcpSocket:
                  port: http
                periodSeconds: 10
                failureThreshold: 60
            liveness:
              enabled: false
              custom: true
              spec:
                tcpSocket:
                  port: http
                initialDelaySeconds: 30
                periodSeconds: 30
            readiness:
              enabled: false
              custom: true
              spec:
                tcpSocket:
                  port: http
                initialDelaySeconds: 10
                periodSeconds: 10
        code:
          image:
            repository: 10.0.20.11:32309/workshop
            tag: latest
            pullPolicy: Always
          args:
            - code-server
          workingDir: /mnt/workshop-storage/workspace
          env:
            TZ: America/Chicago
            WORKSHOP_CACHE_SUBDIR: code-server
            CODE_SERVER_PORT: "8080"
            CODE_SERVER_HOSTNAME: 0.0.0.0
            CODE_SERVER_WORKDIR: /mnt/workshop-storage/workspace
            OP_CONNECT_VAULT: Server
            OPENCODE_DISABLE_AUTOUPDATE: "true"
            GITHUB_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: github-token
            WORKSHOP_SSH_PRIVATE_KEY:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: ssh-private-key
            WORKSHOP_SSH_PUBLIC_KEY:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: ssh-public-key
            OP_SERVICE_ACCOUNT_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: op-service-account-token
            CODE_SERVER_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: password
          probes:
            startup:
              enabled: false
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: code
                periodSeconds: 10
                failureThreshold: 60
            liveness:
              enabled: false
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: code
                initialDelaySeconds: 30
                periodSeconds: 30
            readiness:
              enabled: false
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: code
                initialDelaySeconds: 10
                periodSeconds: 10
  service:
    main:
      controller: main
      primary: true
      ports:
        http:
          port: 4096
          protocol: HTTP
    code:
      controller: main
      ports:
        code:
          port: 8080
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &workshopHost workshop.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - *workshopHost
          secretName: workshop-tls-certificate
    code:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &codeHost code-workshop.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: code
                port: code
      tls:
        - hosts:
            - *codeHost
          secretName: code-workshop-tls-certificate
  persistence:
    data:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        main:
          init-storage:
            - path: /data
          main:
            - path: /mnt/workshop-cache
          code:
            - path: /mnt/workshop-cache
    nfs-workspace:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/opencode
      advancedMounts:
        main:
          init-storage:
            - path: /nfs
          main:
            - path: /mnt/workshop-storage
          code:
            - path: /mnt/workshop-storage
  defaultPodOptions:
    annotations:
      operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/shsxwdyma3wxwyfeiw6ekcefd4"
      operator.1password.io/item-name: "secrets"
      workshop.eaglepass.io/runtime-config-version: "2026-03-12-code-server-sidecar-v3"

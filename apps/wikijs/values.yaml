app-template:
  defaultPodOptions:
    labels:
      app.kubernetes.io/name: wikijs

  controllers:
    wikijs:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        annotations:
          operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/y3bx6ahrieffcgivili4t6jdhy"
          operator.1password.io/item-name: "wikijs-secrets"
      containers:
        main:
          image:
            repository: requarks/wiki
            tag: "2"
            pullPolicy: IfNotPresent
          env:
            TZ: America/Chicago
            DB_TYPE:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-type"
            DB_HOST:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-host"
            DB_PORT:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-port"
            DB_USER:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-user"
            DB_PASS:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-pass"
            DB_NAME:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-name"
            DB_SSL:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-sslmode"
          probes:
            liveness:
              enabled: true
              type: HTTP
              path: /healthz
              port: 3000
              spec:
                initialDelaySeconds: 30
                periodSeconds: 30
                timeoutSeconds: 5
                failureThreshold: 5
            readiness:
              enabled: true
              type: HTTP
              path: /healthz
              port: 3000
              spec:
                initialDelaySeconds: 10
                periodSeconds: 10
                timeoutSeconds: 3
                failureThreshold: 3
            startup:
              enabled: true
              type: HTTP
              path: /healthz
              port: 3000
              spec:
                initialDelaySeconds: 15
                periodSeconds: 5
                timeoutSeconds: 5
                failureThreshold: 60

    postgres:
      type: statefulset
      replicas: 1
      pod:
        annotations:
          operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/y3bx6ahrieffcgivili4t6jdhy"
          operator.1password.io/item-name: "wikijs-secrets"
      containers:
        main:
          image:
            repository: postgres
            tag: "16.4-bookworm"
            pullPolicy: IfNotPresent
          env:
            TZ: "America/Chicago"
            POSTGRES_USER:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-user"
            POSTGRES_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-pass"
            POSTGRES_DB:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-name"
          probes:
            liveness:
              enabled: true
              type: TCP
              port: 5432
              spec:
                initialDelaySeconds: 10
                periodSeconds: 30
                timeoutSeconds: 5
            readiness:
              enabled: true
              type: TCP
              port: 5432
              spec:
                initialDelaySeconds: 5
                periodSeconds: 10
                timeoutSeconds: 3

  service:
    main:
      controller: wikijs
      primary: true
      ports:
        http:
          port: 3000
          protocol: HTTP
    postgres:
      controller: postgres
      ports:
        postgres:
          port: 5432
          protocol: TCP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - host: wikijs.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - wikijs.eaglepass.io
          secretName: wikijs-tls-certificate

  persistence:
    wikijs-data:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 10Gi
      storageClass: standard-rwo
      advancedMounts:
        wikijs:
          main:
            - path: /wiki/data
    postgres-data:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 20Gi
      storageClass: standard-rwo
      advancedMounts:
        postgres:
          main:
            - path: /var/lib/postgresql/data
              subPath: pgdata

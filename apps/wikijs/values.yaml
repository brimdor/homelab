app-template:
  defaultPodOptions:
    securityContext:
      fsGroup: 1000
    labels:
      app.kubernetes.io/name: wikijs

  controllers:
    wikijs:
      type: deployment
      replicas: 1
      strategy: Recreate
      pod:
        annotations:
          operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/y3bx6ahrieffcgivili4t6jdhy"
          operator.1password.io/item-name: "wikijs-secrets"
      initContainers:
        restore-db:
          image:
            repository: postgres
            tag: "18.4-bookworm"
            pullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "[restore-db] Starting restore check..."
              if [ -f /backup/honey-bee.txt ]; then
                echo "[restore-db] honey-bee.txt exists. Skipping restore."
                exit 0
              fi
              if [ -f /backup/wikijs-backup.sql.gz ]; then
                echo "[restore-db] Found backup. Waiting for Postgres..."
                for i in $(seq 1 60); do
                  if pg_isready -h wikijs-postgres -p 5432 -U wikijs -q 2>/dev/null; then
                    echo "[restore-db] Postgres ready. Restoring..."
                    gunzip -c /backup/wikijs-backup.sql.gz | psql "$DB_URL"
                    echo "[restore-db] Restore complete!"
                    touch /backup/honey-bee.txt
                    exit 0
                  fi
                  sleep 5
                done
                echo "[restore-db] ERROR: Timeout waiting for Postgres."
                exit 1
              else
                echo "[restore-db] No backup found. Fresh start."
                touch /backup/honey-bee.txt
              fi
          env:
            DB_URL:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "database-url"
        decode-ssh-key:
          image:
            repository: busybox
            tag: "1.36.1"
            pullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "[decode-ssh-key] Decoding SSH private key..."
              mkdir -p /home/node/.ssh
              chmod 750 /home/node/.ssh
              echo "$SSH_KEY_B64" | base64 -d > /home/node/.ssh/wikijs_ed25519
              chmod 640 /home/node/.ssh/wikijs_ed25519
              chown root:1000 /home/node/.ssh /home/node/.ssh/wikijs_ed25519
              echo "[decode-ssh-key] Done. Key written."
          env:
            SSH_KEY_B64:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "ssh-private-key"
      containers:
        main:
          image:
            repository: requarks/wiki
            tag: "2"
            pullPolicy: IfNotPresent
          env:
            TZ: America/Chicago
            DB_TYPE:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-type"
            DB_HOST:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-host"
            DB_PORT:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-port"
            DB_USER:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-user"
            DB_PASS:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-pass"
            DB_NAME:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-name"
            DB_SSL:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-sslmode"
          probes:
            liveness:
              enabled: true
              type: HTTP
              path: /healthz
              port: 3000
              spec:
                initialDelaySeconds: 30
                periodSeconds: 30
                timeoutSeconds: 5
                failureThreshold: 5
            readiness:
              enabled: true
              type: HTTP
              path: /healthz
              port: 3000
              spec:
                initialDelaySeconds: 10
                periodSeconds: 10
                timeoutSeconds: 3
                failureThreshold: 3
            startup:
              enabled: true
              type: HTTP
              path: /healthz
              port: 3000
              spec:
                initialDelaySeconds: 15
                periodSeconds: 5
                timeoutSeconds: 5
                failureThreshold: 60
        backup-db:
          image:
            repository: postgres
            tag: "18.4-bookworm"
            pullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "[backup-db] Starting backup sidecar..."
              while true; do
                echo "[backup-db] Running pg_dump at $(date)..."
                pg_dump "$DB_URL" | gzip > /backup/wikijs-backup.sql.gz.tmp
                mv /backup/wikijs-backup.sql.gz.tmp /backup/wikijs-backup.sql.gz
                touch /backup/honey-bee.txt
                echo "[backup-db] Backup complete."
                sleep 3600
              done
          env:
            DB_URL:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "database-url"
            DB_PASS:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-pass"

    postgres:
      type: statefulset
      replicas: 1
      pod:
        annotations:
          operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/y3bx6ahrieffcgivili4t6jdhy"
          operator.1password.io/item-name: "wikijs-secrets"
      containers:
        main:
          image:
            repository: postgres
            tag: "18.4-bookworm"
            pullPolicy: IfNotPresent
          env:
            TZ: "America/Chicago"
            POSTGRES_USER:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-user"
            POSTGRES_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-pass"
            POSTGRES_DB:
              valueFrom:
                secretKeyRef:
                  name: "wikijs-secrets"
                  key: "db-name"
          probes:
            liveness:
              enabled: true
              type: TCP
              port: 5432
              spec:
                initialDelaySeconds: 10
                periodSeconds: 30
                timeoutSeconds: 5
            readiness:
              enabled: true
              type: TCP
              port: 5432
              spec:
                initialDelaySeconds: 5
                periodSeconds: 10
                timeoutSeconds: 3

  service:
    main:
      controller: wikijs
      primary: true
      ports:
        http:
          port: 3000
          protocol: HTTP
    postgres:
      controller: postgres
      ports:
        postgres:
          port: 5432
          protocol: TCP

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - host: wikijs.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - wikijs.eaglepass.io
          secretName: wikijs-tls-certificate

  persistence:
    ssh-key:
      type: emptyDir
      advancedMounts:
        wikijs:
          decode-ssh-key:
            - path: /home/node/.ssh
          main:
            - path: /home/node/.ssh
    wikijs-data:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 10Gi
      storageClass: standard-rwo
      advancedMounts:
        wikijs:
          main:
            - path: /wiki/data
          backup-db:
            - path: /backup
          restore-db:
            - path: /backup
    postgres-data:
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 20Gi
      storageClass: standard-rwo
      advancedMounts:
        postgres:
          main:
            - path: /var/lib/postgresql/data
              subPath: pgdata

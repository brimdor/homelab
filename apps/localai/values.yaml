# Values for umbrella chart to configure the go-skynet/local-ai subchart.
# Schema reference: https://raw.githubusercontent.com/go-skynet/helm-charts/main/charts/local-ai/values.yaml

local-ai:
  nameOverride: localai
  fullnameOverride: localai

  # Deployment image override
  deployment:
    image:
      repository: quay.io/go-skynet/local-ai
      tag: master-gpu-nvidia-cuda-12
      # repository: localai/localai
      # tag: master-gpu-nvidia-cuda-12
    pullPolicy: Always

    # Env variables mapped from docker run example
    env:
      LOCALAI_LOG_LEVEL: "debug"
      LOCALAI_P2P: "true"
      LOCALAI_FEDERATED: "true"
      # NGPULayers: "32"
      LOCALAI_SINGLE_ACTIVE_BACKEND: "false"
      LOCALAI_MAX_ACTIVE_BACKENDS: "0"
      LOCALAI_PARALLEL_REQUESTS: "false"
      # Preload after confirming the model is present on the mounted models PVC.
      LOCALAI_LOAD_TO_MEMORY: "sd-3.5-medium-ggml"
      LOCALAI_WATCHDOG_IDLE: "false"
      LOCALAI_WATCHDOG_BUSY: "true"
      LOCALAI_WATCHDOG_IDLE_TIMEOUT: 5m
      LOCALAI_WATCHDOG_BUSY_TIMEOUT: 5m
      PYTHON_GRPC_MAX_WORKERS: "1"
      LLAMACPP_PARALLEL: "1"
      BUILD_TYPE: "cublas"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "all"
      FFMPEG_HWACCEL: "cuda"
      LOCAL_AI_MODELS_PATH: "/models"
      LOCALAI_IMAGE_PATH: "/tmp/generated/images"
    # MODELS_PATH is injected automatically by template from modelsPath below
      # Stable Diffusion GGML uses a separately extracted backend binary.
      BACKENDS_PATH: "/backends"
      LOCALAI_UPLOAD_LIMIT: "1000"

    # Secrets via 1Password operator
    # Add secretEnv items that reference Kubernetes Secrets created by 1Password operator
    # Docs: https://developer.1password.com/docs/k8s/secret-reference/ (fill in your operator annotation keys/values)
    secretEnv: []

    # If your cluster uses NVIDIA runtimeClass, set it here; otherwise use GPU device plugin resources below.
    runtimeClassName: nvidia

  initContainers:
    - name: extract-stablediffusion-backend
      image: gcr.io/go-containerregistry/crane:debug
      imagePullPolicy: IfNotPresent
      command:
        - /busybox/sh
        - -lc
      args:
        - |
          set -eu
          mkdir -p /backends/stablediffusion-ggml-assets
          if [ ! -x /backends/stablediffusion-ggml-assets/stablediffusion-ggml ]; then
            crane export quay.io/go-skynet/local-ai-backends:latest-gpu-nvidia-cuda-12-stablediffusion-ggml - | tar -C /backends/stablediffusion-ggml-assets -xf -
          fi

    - name: install-stablediffusion-wrapper
      image: alpine:3.20
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -lc
      args:
        - |
          set -eu
          cat > /backends/stablediffusion-ggml <<'EOF'
          #!/bin/sh
          set -eu

          ASSETDIR=/backends/stablediffusion-ggml-assets
          LIBRARY="$ASSETDIR/libgosd-fallback.so"

          if grep -q -e '\savx\s' /proc/cpuinfo 2>/dev/null && [ -e "$ASSETDIR/libgosd-avx.so" ]; then
            LIBRARY="$ASSETDIR/libgosd-avx.so"
          fi

          if grep -q -e '\savx2\s' /proc/cpuinfo 2>/dev/null && [ -e "$ASSETDIR/libgosd-avx2.so" ]; then
            LIBRARY="$ASSETDIR/libgosd-avx2.so"
          fi

          if grep -q -e '\savx512f\s' /proc/cpuinfo 2>/dev/null && [ -e "$ASSETDIR/libgosd-avx512.so" ]; then
            LIBRARY="$ASSETDIR/libgosd-avx512.so"
          fi

          export LD_LIBRARY_PATH="$ASSETDIR/lib:${LD_LIBRARY_PATH:-}"
          export SD_LIBRARY="$LIBRARY"

          if [ -f "$ASSETDIR/lib/ld.so" ]; then
            exec "$ASSETDIR/lib/ld.so" "$ASSETDIR/stablediffusion-ggml" "$@"
          fi

          exec "$ASSETDIR/stablediffusion-ggml" "$@"
          EOF

          chmod 0755 /backends/stablediffusion-ggml

  # Resources suitable for GPU workloads (adjust as needed)
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
      # nvidia.com/gpu: 1
    limits:
      cpu: "2"
      memory: "8Gi"
      # nvidia.com/gpu: 1

  # Persistent storage for models, extracted backends, and outputs.
  persistence:
    models:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 50Gi
      globalMount: /models
    backends:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 5Gi
      globalMount: /backends
    output:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 20Gi
      globalMount: /tmp/generated

  # Service exposure
  service:
    type: ClusterIP
    port: 8080

  # Ingress for eaglepass.io
  ingress:
    main:
      enabled: true
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: localai.eaglepass.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: localai-eaglepass-io-tls
        hosts:
          - localai.eaglepass.io

  # Probes (use upstream defaults; override if needed)
  # livenessProbe:
  #   httpGet:
  #     path: /health
  #     port: 8080
  # readinessProbe:
  #   httpGet:
  #     path: /ready
  #     port: 8080

  # Node placement and GPU scheduling
  nodeSelector: {}
  tolerations:
    - key: "dedicated"
      value: "arcanine"
      effect: "NoSchedule"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - arcanine

  # 1Password operator annotations on Pod template (placeholders)
  # podAnnotations:
    # onepassword.com/item-path: "vaults/<vault>/items/<item>"
    # onepassword.com/auto-restart: "true"
    # onepassword.com/inject: "true"
    # "onepassword.example/placeholder": "fill-me"

  # Example of secret-driven env using secretKeyRef (K8s Secret created by 1Password operator)
  # deployment:
  #   secretEnv:
  #     - name: SOME_API_KEY
  #       valueFrom:
  #         secretKeyRef:
  #           name: "localai-secrets" # Secret created by 1Password operator
  #           key: "SOME_API_KEY"

  # Optional: override threads/context
  # deployment:
  #   env:
  #     threads: "8"
  #     context_size: "4096"

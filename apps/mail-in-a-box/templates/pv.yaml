apiVersion: v1
kind: PersistentVolume
metadata:
  name: mail-data-pv
spec:
  capacity:
    storage: {{ .Values.persistence.mail-data.size }}
  accessModes:
    - ReadWriteMany
  nfs:
    server: {{ .Values.persistence.mail-data.nfs.server }}
    path: {{ .Values.persistence.mail-data.nfs.path }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mail-state-pv

  capacity:
    storage: {{ .Values.persistence.mail-state.size }}
  accessModes:
    - ReadWriteMany
  nfs:
    server: {{ .Values.persistence.mail-state.nfs.server }}
    path: {{ .Values.persistence.mail-state.nfs.path }}
---

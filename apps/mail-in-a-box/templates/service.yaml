apiVersion: v1
kind: Service
metadata:
  name: mail-server
  labels:
    app: mail-server
spec:
  ports:
    {{- range .Values.ports }}
    - name: {{ .name }}
      port: {{ .port }}
      targetPort: {{ .targetPort }}
      protocol: {{ .protocol }}
    {{- end }}
  selector:
    app: mail-server
  type: ClusterIP

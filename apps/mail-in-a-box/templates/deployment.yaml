apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mail-server
  template:
    metadata:
      labels:
        app: mail-server
    spec:
      initContainers:
        # - name: init-permissions
        #   image: busybox
        #   command: ['sh', '-c', 'chown -R 5000:5000 /var/log/mail']
        #   volumeMounts:
        #     - name: mail-logs
        #       mountPath: /var/log/mail
        - name: init-mail-account
          image: ghcr.io/docker-mailserver/docker-mailserver:latest
          command: ["/bin/bash", "-c"]
          args:
            - >
              echo "${MAIL_USER}|$(doveadm pw -s SHA512-CRYPT -u ${MAIL_USER} -p ${MAIL_PASS})" >> /tmp/docker-mailserver/postfix-accounts.cf;
          env:
            - name: MAIL_USER
              value: "{{ .Values.initialAccount.email }}"
            - name: MAIL_PASS
              value: "{{ .Values.initialAccount.password }}"
          volumeMounts:
            - name: mail-config
              mountPath: /tmp/docker-mailserver
      containers:
        - name: mail-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: "{{ .Values.image.pullPolicy }}"
          ports:
            {{- range .Values.ports }}
            - containerPort: {{ .port }}
              name: {{ .name }}
              protocol: {{ .protocol }}
            {{- end }}
          volumeMounts:
            - name: mail-data
              mountPath: {{ .Values.volumes.mailData.mountPath }}
            - name: mail-state
              mountPath: {{ .Values.volumes.mailState.mountPath }}
            - name: mail-logs
              mountPath: {{ .Values.volumes.mailLogs.mountPath }}
            - name: mail-config
              mountPath: {{ .Values.volumes.mailConfig.mountPath }}
          env:
            - name: HOSTNAME
              value: "mail.eaglepass.io"
            - name: DOMAINNAME
              value: "eaglepass.io"
            - name: OVERRIDE_HOSTNAME
              value: "mail.eaglepass.io"
            - name: ENABLE_SPAMASSASSIN
              value: "1"
            - name: ENABLE_CLAMAV
              value: "1"
            - name: ENABLE_FAIL2BAN
              value: "1"
            - name: ENABLE_POSTGREY
              value: "1"
            - name: SMTP_ONLY
              value: "0"
            - name: ENABLE_SRS
              value: "0"
            - name: SSL_TYPE
              value: "letsencrypt"
      volumes:
        - name: mail-data
          nfs:
            server: {{ .Values.nfs.server }}
            path: {{ .Values.volumes.mailData.nfsPath }}
        - name: mail-state
          nfs:
            server: {{ .Values.nfs.server }}
            path: {{ .Values.volumes.mailState.nfsPath }}
        - name: mail-logs
          nfs:
            server: {{ .Values.nfs.server }}
            path: {{ .Values.volumes.mailLogs.nfsPath }}
        - name: mail-config
          nfs:
            server: {{ .Values.nfs.server }}
            path: {{ .Values.volumes.mailConfig.nfsPath }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mail-server
  template:
    metadata:
      labels:
        app: mail-server
    spec:
      containers:
      - name: mail-server
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: MAIL_DOMAIN
          value: {{ .Values.env.MAIL_DOMAIN }}
        - name: ADMIN_EMAIL
          value: {{ .Values.env.ADMIN_EMAIL }}
        - name: UID
          value: {{ .Values.env.UID | quote }}
        - name: GID
          value: {{ .Values.env.GID | quote }}
        ports:
        - containerPort: 80
        - containerPort: 443
        - containerPort: 25
        - containerPort: 587
        - containerPort: 993
        volumeMounts:
        - name: config-volume
          mountPath: /mailinabox-data
      volumes:
      - name: config-volume
        persistentVolumeClaim:
          claimName: mail-server-pvc

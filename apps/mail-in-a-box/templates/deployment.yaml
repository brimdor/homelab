apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-server
  labels:
    app: mail-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mail-server
  template:
    metadata:
      labels:
        app: mail-server
    spec:
      containers:
        - name: mail-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.policy }}
          env:
            - name: TZ
              value: {{ .Values.env.TZ }}
          volumeMounts:
            - name: mail-server-data
              mountPath: /mnt/data
      volumes:
        - name: mail-server-data
          persistentVolumeClaim:
            claimName: mail-server-pvc

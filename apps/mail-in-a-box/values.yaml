image:
  repository: mail-in-a-box
  tag: latest
  policy: Always

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    hajimari.io/appName: Mail Server
    hajimari.io/icon: envelope
  hosts:
    - host: mail.eaglepass.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - mail.eaglepass.io
      secretName: mail-server-tls

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1"

env:
  TZ: "America/Chicago"

persistence:
  enabled: true
  accessModes:
    - ReadWriteMany
  size: 10Gi
  storageClass: ""
  nfs:
    server: 10.0.50.3
    path: /mnt/user/mail_server_config

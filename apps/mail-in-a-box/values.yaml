image:
  repository: ghcr.io/docker-mailserver/docker-mailserver
  tag: latest
  pullPolicy: Always

nfs:
  server: 10.0.50.3
  paths:
    mailData: /mnt/user/mail-data
    mailState: /mnt/user/mail-state
    mailLogs: /mnt/user/mail-logs
    mailConfig: /mnt/user/mail-config

resources:
  requests:
    memory: "64Mi"
    cpu: "250m"
  limits:
    memory: "128Mi"
    cpu: "500m"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    hajimari.io/appName: Mail Server
    hajimari.io/icon: mail
  hosts:
    - host: mail.eaglepass.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - mail.eaglepass.io
      secretName: mail-server-tls

ports:
  - name: smtp
    port: 25
    targetPort: 25
    protocol: TCP
  - name: smtps
    port: 465
    targetPort: 465
    protocol: TCP
  - name: submission
    port: 587
    targetPort: 587
    protocol: TCP
  - name: imap
    port: 143
    targetPort: 143
    protocol: TCP
  - name: imaps
    port: 993
    targetPort: 993
    protocol: TCP
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: https
    port: 443
    targetPort: 443
    protocol: TCP

volumes:
  mailData:
    name: mail-data
    mountPath: /var/mail
    nfsPath: /mnt/user/mail-data
  mailState:
    name: mail-state
    mountPath: /var/mail-state
    nfsPath: /mnt/user/mail-state
  mailLogs:
    name: mail-logs
    mountPath: /var/log/mail
    nfsPath: /mnt/user/mail-logs
  mailConfig:
    name: mail-config
    mountPath: /tmp/docker-mailserver
    nfsPath: /mnt/user/mail-config

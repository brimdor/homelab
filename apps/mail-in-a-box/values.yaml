image:
  repository: ghcr.io/docker-mailserver/docker-mailserver
  tag: latest
  pullPolicy: Always

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    hajimari.io/appName: Mailserver
    hajimari.io/icon: email
  hosts:
    - host: mail.eaglepass.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - mail.eaglepass.io
      secretName: mail-tls

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1"

env:
  HOSTNAME: "mail.eaglepass.io"

persistence:
  enabled: true
  size: 10Gi
  nfs:
    server: 10.0.50.3
    path: /mnt/user/mail_server

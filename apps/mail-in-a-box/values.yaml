image:
  repository: ghcr.io/docker-mailserver/docker-mailserver
  tag: latest
  pullPolicy: Always

nfs:
  server: 10.0.50.3
  path: /mnt/user

resources:
  requests:
    memory: "64Mi"
    cpu: "250m"
  limits:
    memory: "128Mi"
    cpu: "500m"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    hajimari.io/appName: Mail Server
    hajimari.io/icon: mail
  hosts:
    - host: mail.eaglepass.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - mail.eaglepass.io
      secretName: mail-server-tls

elementweb:
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    hosts:
      - host: &frontend_host chat.eaglepass.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: element-tls-certificate
        hosts:
          - *frontend_host
  config:
    default:
      base_url: https://matrix.eaglepass.io
      server_name: eaglepass.io
  persistence:
    enabled: true
    type: nfs
    server: 10.0.40.3
    path: /mnt/user/matrix/elementweb
    advancedMounts:
      main:
        main:
          - path: /config

dendrite:
  dendrite_config:
    global:
      server_name: matrix.eaglepass.io
    client_api:
      # Allow user registration while we create the initial admin account.
      # IMPORTANT: this is temporary and will be reverted after account creation.
      registration_disabled: false
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hostName: matrix.eaglepass.io
    tls:
      - hosts:
          - matrix.eaglepass.io
        secretName: matrix-tls-certificate
  # Pass extra args to the dendrite binary. Needed to allow open registration
  # when we explicitly enable it here for initial user provisioning.
  extraArgs:
    - "-really-enable-open-registration"
  postgresql:
    enabled: true
    image:
      repository: bitnamilegacy/postgresql
      tag: "16.6.0"
    persistence:
      enabled: true
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/matrix/postgresql
      size: 10Gi
      retain: true

# NFS volumes - points at NAS path /mnt/user/matrix
volumes:
  nfs:
    enabled: "true"
    name: "matrix"
    server: "10.0.40.3"
    path: "/mnt/user/matrix"

# Generic persistence block (some subcharts use this schema)
persistence:
  data:
    enabled: true
    type: nfs
    server: 10.0.40.3
    path: /mnt/user/matrix
    advancedMounts:
      dendrite:
        main:
          - path: /data
      elementweb:
        main:
          - path: /config

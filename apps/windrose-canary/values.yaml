# Canary Windrose server.
# Reuses the same 1Password item as production for boot-only smoke tests.
# A separate 1Password item (windrose-canary-secrets) should be created once
# an isolated canary invite code is needed.
app-template:
  controllers:
    main:
      strategy: Recreate
      replicas: 1
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          image:
            repository: indifferentbroccoli/windrose-server-docker
            tag: latest
            pullPolicy: IfNotPresent
          env:
            TZ: America/Chicago
            PUID: "1000"
            PGID: "1000"
            INVITE_CODE:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: invite-code
            SERVER_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: server-password
            SERVER_NAME:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: owner-name
            USE_DIRECT_CONNECTION: "false"
            P2P_PROXY_ADDRESS: "127.0.0.1"
            USER_SELECTED_REGION: ""
            MAX_PLAYERS: "4"
            GENERATE_SETTINGS: "true"
            WINDROSE_PLUS_ENABLED: "true"
            WINDROSE_PLUS_DASHBOARD_PORT: "8781"
            WINDROSE_PLUS_RCON_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: rcon-password
            UPDATE_ON_START: "true"
            NVIDIA_VISIBLE_DEVICES: "all"
            NVIDIA_DRIVER_CAPABILITIES: "all"
          command:
            - /bin/bash
            - -c
            - |
              # Patch ALL WorldDescription.json files to "Easy" (calm seas)
              # whenever they appear. The image's start.sh generates them with
              # "Medium" during first-boot, then launches the server which reads
              # them to create worlds. The server may create multiple worlds,
              # so we patch every WorldDescription.json we find, continuously.
              (
                while true; do
                  find /home/steam/server-files/R5/Saved/SaveProfiles -name WorldDescription.json 2>/dev/null | while IFS= read -r WD; do
                    cur=$(tr -d '\r' < "$WD" | jq -r '.WorldDescription.WorldPresetType // ""' 2>/dev/null)
                    if [ "$cur" != "Easy" ]; then
                      tr -d '\r' < "$WD" | jq '.WorldDescription.WorldPresetType = "Easy" | .WorldDescription.WorldSettings = {}' > "${WD}.tmp" && mv "${WD}.tmp" "$WD"
                    fi
                  done
                  sleep 0.5
                done
              ) &
              exec /home/steam/server/init.sh
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 1000m
              memory: 4Gi
            limits:
              cpu: 2000m
              memory: 8Gi
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - 'pgrep "wine" > /dev/null'
                initialDelaySeconds: 360
                periodSeconds: 60
                timeoutSeconds: 10
                failureThreshold: 3
            readiness:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - 'pgrep "wine" > /dev/null'
                initialDelaySeconds: 360
                periodSeconds: 30
                timeoutSeconds: 10
                failureThreshold: 3
            startup:
              enabled: true
              custom: true
              spec:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - 'pgrep "wine" > /dev/null'
                failureThreshold: 120
                periodSeconds: 5
                timeoutSeconds: 10
          ports:
            - name: game-tcp
              containerPort: 7777
              protocol: TCP
            - name: game-udp
              containerPort: 7777
              protocol: UDP
            - name: dashboard
              containerPort: 8781
              protocol: TCP
  service:
    main:
      primary: true
      controller: main
      ports:
        game-tcp:
          port: 7777
          protocol: TCP
        game-udp:
          port: 7777
          protocol: UDP
        dashboard:
          port: 8780
          protocol: TCP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: windrose-canary.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: dashboard
      tls:
        - hosts:
            - windrose-canary.eaglepass.io
          secretName: windrose-canary-tls
  persistence:
    data:
      type: persistentVolumeClaim
      enabled: true
      accessMode: ReadWriteOnce
      size: 50Gi
      storageClass: standard-rwo
      advancedMounts:
        main:
          main:
            - path: /home/steam/server-files
  defaultPodOptions:
    dnsPolicy: ClusterFirst
    tolerations:
      - key: dedicated
        operator: Equal
        value: arcanine
        effect: NoSchedule
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - "arcanine"
    annotations:
      operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/4yvgaf774xiakjmabidcsoshl4"
      operator.1password.io/item-name: "secrets"

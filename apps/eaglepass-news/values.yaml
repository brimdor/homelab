app-template:
  controllers:
    main:
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 1
        surge: "0"
      replicas: 1
      containers:
        main:
          nameOverride: eaglepass-news
          image:
            repository: 10.0.20.11:32309/eaglepass-news
            tag: "2025-05-16-v2"
            pullPolicy: Always
          ports:
            - containerPort: 8501
              name: http
          env:
            TZ: America/Chicago
          probes:
            liveness:
              enabled: true
              type: HTTP
              path: /_stcore/health
              spec:
                initialDelaySeconds: 30
                periodSeconds: 60
                failureThreshold: 3
            readiness:
              enabled: true
              type: HTTP
              path: /_stcore/health
              spec:
                initialDelaySeconds: 5
                periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
  service:
    main:
      primary: true
      ports:
        http:
          port: 8501
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - host: news.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - news.eaglepass.io
          secretName: eaglepass-news-tls
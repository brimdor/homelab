app-template:
  controllers:
    main:
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 1
        surge: "0"
      replicas: 1
      containers:
        main:
          nameOverride: eaglepass-news
          image:
            repository: 10.0.20.11:32309/eaglepass-news
            tag: "2026-06-22-rss-pipeline"
            pullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            TZ: America/Chicago
            PORT: "3000"
          probes:
            liveness:
              enabled: true
              type: HTTP
              path: /api/newsletter/items
              spec:
                initialDelaySeconds: 30
                periodSeconds: 60
                failureThreshold: 3
            readiness:
              enabled: true
              type: HTTP
              path: /api/newsletter/items
              spec:
                initialDelaySeconds: 5
                periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
  service:
    main:
      primary: true
      ports:
        http:
          port: 3000
          protocol: HTTP
  # No persistence: the Node.js server reads daily JSONs from the image
  # (/app/data/daily baked in at build time). The previous PVC mount at
  # /app/data was inherited from the Streamlit deployment (eaglepass_news.db)
  # and shadows the bundled daily files, causing the server to fall back to
  # the 3-item fixture instead of the 16 RSS articles. Daily JSONs are
  # refreshed by rebuilding the image, not via runtime writes.
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - host: news.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - news.eaglepass.io
          secretName: eaglepass-news-tls

rook-ceph:
  monitoring:
    enabled: true
  csi:
    pluginTolerations:
      - key: dedicated
        operator: Exists
        effect: NoSchedule
    provisionerTolerations:
      - key: dedicated
        operator: Exists
        effect: NoSchedule
  discover:
    tolerations:
      - key: dedicated
        operator: Exists
        effect: NoSchedule
rook-ceph-cluster:
  monitoring:
    # Disabled due to Ceph v20.2.0 prometheus module bug (tracker #72380)
    # The module crashes on startup in Rook deployments (no cephadm orchestrator)
    # Re-enable when upgrading to Ceph v20.2.1+ which includes the fix
    enabled: false
    createPrometheusRules: true
  cephClusterSpec:
    cephVersion:
      image: quay.io/ceph/ceph:v20.2.0
      imagePullPolicy: IfNotPresent
    storage:
      useAllNodes: false
      useAllDevices: true
      nodes:
        - name: arcanine
          # osd.2 on arcanine:sda was raising recurring BlueFS stalled-read alerts;
          # pin Ceph to the dedicated Samsung data SSD and exclude the shared boot disk.
          devices:
            - name: sdb
        # bulbasaur excluded: osd.4 device has recurring BlueFS stalled-read alerts
        - name: chikorita
        - name: cyndaquil
        - name: growlithe
        - name: sprigatito
    placement:
      all:
        tolerations:
          - key: dedicated
            operator: Exists
    mon:
      count: 3
    mgr:
      count: 2
    dashboard:
      ssl: false
    logCollector:
      enabled: false
    removeOSDsIfOutAndSafeToRemove: true
    resources:
      mgr:
        limits:
          memory: "1Gi"
        requests:
          cpu: "100m"
          memory: "512Mi"
      mon:
        limits:
          memory: "2Gi"
        requests:
          cpu: "100m"
          memory: "100Mi"
      osd:
        limits:
          memory: "4Gi"
        requests:
          cpu: "100m"
          memory: "512Mi"
  cephBlockPools:
    - name: standard-rwo
      spec:
        replicated:
          size: 2
      storageClass:
        enabled: true
        name: standard-rwo
        isDefault: true
        allowVolumeExpansion: true
        parameters:
          imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
          csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
          csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
          csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
          csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
          csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
          csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
  cephBlockPoolsVolumeSnapshotClass:
    enabled: true
    isDefault: true
  cephFileSystems:
    - name: standard-rwx
      spec:
        metadataPool:
          replicated:
            size: 2
        dataPools:
          - name: data0
            replicated:
              size: 2
        metadataServer:
          activeCount: 1
          activeStandby: true
          resources:
            limits:
              memory: "4Gi"
            requests:
              cpu: "100m"
              memory: "100Mi"
          priorityClassName: system-cluster-critical
      storageClass:
        enabled: true
        name: standard-rwx
        isDefault: false
        allowVolumeExpansion: true
        pool: data0
        parameters:
          csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
          csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
          csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
          csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
          csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
          csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
  cephFileSystemVolumeSnapshotClass:
    enabled: true
    isDefault: false
  cephObjectStores: []

pvcHygiene:
  enabled: true
  schedule: "0 3 * * *"
  image: registry.k8s.io/kubectl:v1.35.3
  mode: report
  minAgeHours: 168
  approvedDeleteAnnotation: homelab.eaglepass.io/pvc-prune
  approvedDeleteValue: approved
  ignoredNamespaces:
    - kube-system
    - rook-ceph
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

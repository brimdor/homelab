action_items:
  - id: "A1"
    priority: "P0"
    layer: "System"
    phase: "A"
    title: "Run preflight validation snapshot before executing changes"
    goal: "Establish pre-change baseline and stop immediately if additional RED findings appear."
    commands: >-
      ssh brimdor@10.0.20.10 "KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl get nodes --no-headers | grep -v ' Ready ' || true; KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl get pods -n kube-system --no-headers | grep -v 'Running\|Completed' || true; KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl get applications -n argocd --no-headers | grep -v 'Synced.*Healthy' || true; KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph health" && ~/.config/opencode/scripts/homelab-network-check.sh --json && ~/.config/opencode/scripts/homelab-nas-check.sh --json
    expected: "No NotReady nodes, no kube-system failures, known app drift only (emby/rook-ceph), and baseline evidence captured."
    if_fails: "If new RED findings appear, halt and create a dedicated blocking task before any change actions."
    rollback: "N/A"

  - id: "B1"
    priority: "P0"
    layer: "Storage"
    phase: "B"
    title: "Diagnose Ceph prometheus mgr module HEALTH_ERR"
    goal: "Confirm current failure mode and crash scope before remediation."
    commands: >-
      ssh brimdor@10.0.20.10 "KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph health detail && KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph crash ls-new && KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph mgr module ls"
    expected: "Crash list and module state captured; root cause remains limited to prometheus mgr module formatting exception."
    if_fails: "If diagnostics cannot run, gather rook-ceph-operator logs and block all downstream tasks."
    rollback: "N/A"

  - id: "B2"
    priority: "P0"
    layer: "Storage"
    phase: "B"
    title: "Apply low-risk Ceph remediation (archive crashes and restart mgr-a)"
    goal: "Capture pre-change Ceph status backup, then clear stale crash records and restart mgr process to recover module health without data-plane disruption."
    commands: >-
      ssh brimdor@10.0.20.10 "KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph status -f json > /tmp/ceph-status-pre-B2.json && KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph crash archive-all && KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl -n rook-ceph rollout restart deploy/rook-ceph-mgr-a && KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl -n rook-ceph rollout status deploy/rook-ceph-mgr-a --timeout=300s"
    expected: "Pre-change backup /tmp/ceph-status-pre-B2.json exists, mgr-a rollout completes, and no new immediate prometheus crash appears."
    if_fails: "If rollout or crash behavior worsens, stop and escalate for manual Ceph maintainer review before disabling modules."
    rollback: "ssh brimdor@10.0.20.10 \"KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl -n rook-ceph rollout undo deploy/rook-ceph-mgr-a\""


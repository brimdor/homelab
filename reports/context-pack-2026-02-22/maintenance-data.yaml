    priority: "P1"
    layer: "Platform"
    phase: "C"
    title: "Review PR #65 major update with release notes and breaking-change checklist"
    goal: "Capture upgrade risk for kube-prometheus-stack 82.x before merge decision."
    commands: >-
      set -a; source ~/.config/gitea/.env; set +a; curl -s "https://git.eaglepass.io/api/v1/repos/ops/homelab/pulls/65" -H "Authorization: token $GITEA_TOKEN" | jq -r '.body' > /tmp/pr65-body.md; curl -fsSL "https://raw.githubusercontent.com/prometheus-community/helm-charts/main/charts/kube-prometheus-stack/UPGRADE.md" > /tmp/kube-prometheus-stack-UPGRADE.md
    expected: "Documented release notes, explicit breaking-change checklist, and a go/no-go decision captured in task execution notes."
    if_fails: "If release notes cannot be retrieved, mark PR #65 as deferred and do not merge."
    rollback: "N/A"

  - id: "C2"
    priority: "P1"
    layer: "Platform"
    phase: "C"
    title: "Execute merge/close decision for PR #65 and run staged monitoring validation"
    goal: "Capture pre-merge monitoring backup, then apply major monitoring stack update only when risk gate passes and verify observability stack stability."
    commands: >-
      ssh brimdor@10.0.20.10 "KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl get application -n argocd monitoring-system -o yaml > /tmp/monitoring-system-app-pre-C2.yaml && KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl get pods -n monitoring-system -o wide > /tmp/monitoring-system-pods-pre-C2.txt" && set -a; source ~/.config/gitea/.env; set +a; curl -s -X POST "https://git.eaglepass.io/api/v1/repos/ops/homelab/pulls/65/merge" -H "Authorization: token $GITEA_TOKEN" -H "Content-Type: application/json" -d '{"Do":"merge"}' && ssh brimdor@10.0.20.10 "KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl get applications -n argocd monitoring-system -o wide && KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl get pods -n monitoring-system -o wide && KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl get pods -n grafana -o wide"
    expected: "Pre-merge backups exist (/tmp/monitoring-system-app-pre-C2.yaml, /tmp/monitoring-system-pods-pre-C2.txt), PR #65 merges cleanly, and monitoring-system remains Synced+Healthy with Prometheus/Alertmanager/Grafana pods Running."
    if_fails: "If merge fails or monitoring degrades, close/defer PR #65 and open rollback PR immediately."
    rollback: "git revert <merge-commit-for-pr65> && git push"

  - id: "C3"
    priority: "P1"
    layer: "Apps"
    phase: "C"
    title: "Fix emby ArgoCD sync error in repo (invalid deployment strategy rendering)"
    goal: "Make emby manifests apply cleanly so app returns to Synced state."
    commands: >-
      git checkout -b fix/emby-sync-strategy && python3 -c "from pathlib import Path; p=Path('apps/emby/values.yaml'); t=p.read_text(); t=t.replace('# strategy: RollingUpdate','strategy: RollingUpdate',1) if '# strategy: RollingUpdate' in t else t; p.write_text(t)" && git add apps/emby/values.yaml && git commit -m "fix(emby): set valid deployment strategy for argocd sync" && git push -u origin fix/emby-sync-strategy
    expected: "A fix PR is created with explicit strategy config change and no invalid rollingUpdate/recreate combination."
    if_fails: "If this exact change does not fix render output, generate rendered manifests and adjust values/template in follow-up fix PR."
    rollback: "git switch master && git branch -D fix/emby-sync-strategy"

  - id: "C4"
    priority: "P1"
    layer: "Apps"
    phase: "C"
    title: "Validate emby app returns to Synced+Healthy after fix merge"
    goal: "Confirm application drift is resolved and runtime remains healthy."
    commands: >-
      ssh brimdor@10.0.20.10 "KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl -n argocd get application emby -o jsonpath='{.status.sync.status} {.status.health.status}{"\n"}' && KUBECONFIG=~/homelab/metal/kubeconfig.yaml kubectl -n emby get deploy emby -o jsonpath='{.spec.strategy.type}{"\n"}'"
    expected: "emby shows Synced Healthy and deployment strategy type is valid (RollingUpdate or Recreate without forbidden rollingUpdate block)."
    if_fails: "If still OutOfSync, inspect argocd application operationState message and update fix PR with exact manifest correction."
    rollback: "git revert <merge-commit-for-emby-fix> && git push"

  - id: "D1"
    priority: "P2"
    layer: "Storage"
    phase: "D"
    title: "Investigate NAS YELLOW web probe and classify as expected or incident"
    goal: "Eliminate ambiguity in NAS health gate so Storage layer can be GREEN with clear criteria."
    commands: >-
      ~/.config/opencode/scripts/homelab-nas-check.sh --json > /tmp/nas-check.json && curl -sk -o /dev/null -w "%{http_code}\n" http://10.0.40.3 && curl -sk -o /dev/null -w "%{http_code}\n" https://10.0.40.3
    expected: "Either HTTP response confirms service reachable (200/30x/401/403 accepted) or a concrete incident is identified with owner."
    if_fails: "If endpoint remains ambiguous, capture tcpdump/reverse-proxy logs and keep NAS gate as YELLOW with documented exception."
    rollback: "N/A"


    expected: "ceph health reports HEALTH_OK, ceph crash ls-new is empty, and rook-ceph app is Synced+Healthy."
    if_fails: "If HEALTH_ERR persists, add follow-up hotfix task for Ceph image/module patch and block PR merges."
    rollback: "N/A"


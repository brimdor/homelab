      kubectl get nodes --no-headers | grep -v ' Ready ' || true; kubectl get pods -n kube-system --no-headers | grep -v 'Running\|Completed' || true; kubectl get applications -n argocd --no-headers | grep -v 'Synced.*Healthy' || true; kubectl -n rook-ceph exec deploy/rook-ceph-tools -- ceph health; kubectl get pods -A --no-headers | grep -v 'Running\|Completed' || true; ~/.config/opencode/scripts/homelab-network-check.sh --json > /tmp/network-preflight.json; ~/.config/opencode/scripts/homelab-nas-check.sh --json > /tmp/nas-preflight.json

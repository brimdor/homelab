    if_fails: "Stop immediately and open a new blocking recon item for the failing layer before any PR actions."
    rollback: "N/A"

  - id: "C1"
    priority: "P1"
    layer: "Platform"
    phase: "C"
    title: "PR #65 release-notes and breaking-change gate"
    goal: "Gather evidence for kube-prometheus-stack v82 risk and make the merge/defer decision explicit."
    commands: >-
      set -a; source ~/.config/gitea/.env; set +a; curl -s "https://git.eaglepass.io/api/v1/repos/ops/homelab/pulls/65" -H "Authorization: token $GITEA_TOKEN" | jq -r '.title,.mergeable,.body' > /tmp/pr65-review.txt; curl -fsSL "https://raw.githubusercontent.com/prometheus-community/helm-charts/main/charts/kube-prometheus-stack/UPGRADE.md" > /tmp/kube-prometheus-stack-UPGRADE.md
    expected: "Release notes and breaking-change checklist documented, with go/no-go decision captured."
    if_fails: "If release notes or checklist cannot be completed, defer PR #65 and keep it open."
    rollback: "N/A"

  - id: "C2"
    priority: "P1"
    layer: "Platform"
    phase: "C"
    title: "Execute PR #65 merge/defer decision with backup"
    goal: "Only merge after C1 passes; preserve rollback artifacts before any major monitoring update."
    commands: >-
      kubectl get application -n argocd monitoring-system -o yaml > /tmp/monitoring-system-app-pre-pr65.yaml; kubectl get pods -n monitoring-system -o wide > /tmp/monitoring-system-pods-pre-pr65.txt; set -a; source ~/.config/gitea/.env; set +a; curl -s -X POST "https://git.eaglepass.io/api/v1/repos/ops/homelab/pulls/65/merge" -H "Authorization: token $GITEA_TOKEN" -H "Content-Type: application/json" -d '{"Do":"merge"}'
    expected: "Pre-merge backups exist and PR #65 is either merged successfully or explicitly deferred with rationale."
    if_fails: "If merge fails or decision is defer, leave PR open and record blocker in maintenance issue body."
    rollback: "git revert <merge-commit-for-pr65> && git push"


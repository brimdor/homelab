app-template:
  controllers:
    main:
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: 10.0.20.11:32309/scribe
            tag: latest
            pullPolicy: Always
          env:
            TZ: America/Chicago
            HOST: 0.0.0.0
            PORT: "3100"
            NODE_ENV: production
            SCRIBE_DB_ENCRYPTION_KEY:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: scribe-db-encryption-key
            GITHUB_TOKEN:
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: github-token
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: http
                initialDelaySeconds: 10
                periodSeconds: 30
                failureThreshold: 3
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: http
                initialDelaySeconds: 5
                periodSeconds: 10
                failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
  service:
    main:
      controller: main
      primary: true
      ports:
        http:
          port: 3100
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: "homelab-tunnel.eaglepass.io"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: scribe.eaglepass.io
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - scribe.eaglepass.io
          secretName: scribe-tls-certificate
  persistence:
    data:
      type: nfs
      server: 10.0.40.3
      path: /mnt/user/scribe
      advancedMounts:
        main:
          main:
            - path: /app/server/data
            - path: /app/server/repos
  defaultPodOptions:
    annotations:
      operator.1password.io/item-path: "vaults/4uaua4a45yuhnwhehp5bwylmti/items/scribe-secrets"
      operator.1password.io/item-name: "scribe-secrets"

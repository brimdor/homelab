zot:
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
    className: nginx
    hosts:
      - host: &host registry.eaglepass.io
        paths:
          - path: /
    tls:
      - secretName: zot-tls-certificate
        hosts:
          - *host
  # TODO enable auth
  mountConfig: true
  configFiles:
    config.json: |-
      {
        "storage": {
          "rootDirectory": "/var/lib/registry",
          "dedupe": false
        },
        "http": {
          "address": "0.0.0.0",
          "port": "5000"
        },
        "log": {
          "level": "debug"
        }
      }
  persistence: true
  pvc:
    create: true
    storage: 50Gi

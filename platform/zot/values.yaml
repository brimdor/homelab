zot:
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
    className: nginx
    hosts:
      - host: &host registry.eaglepass.io
        paths:
          - path: /
    tls:
      - secretName: zot-tls-certificate
        hosts:
          - *host
  podLabels:
    app: zot
  service:
    selector:
      app: zot
      app.kubernetes.io/name: zot
      app.kubernetes.io/instance: zot
  # TODO enable auth
  persistence: true
  pvc:
    create: true
    storage: 50Gi
